<svg viewBox="0 0 200 140" width="100%" style="max-height:120px" aria-hidden="true">

  <!-- Reduced motion styling -->
  <style>
    @media (prefers-reduced-motion: reduce) {
      .anim { animation: none; }
      .anim * { animateTransform { } }
    }
  </style>

  <!-- Background grid -->
  <line x1="20"  y1="12" x2="20"  y2="128" stroke="var(--ink)" stroke-width="0.5" opacity="0.15"/>
  <line x1="60"  y1="12" x2="60"  y2="128" stroke="var(--ink)" stroke-width="0.5" opacity="0.15"/>
  <line x1="100" y1="12" x2="100" y2="128" stroke="var(--ink)" stroke-width="0.5" opacity="0.15"/>
  <line x1="140" y1="12" x2="140" y2="128" stroke="var(--ink)" stroke-width="0.5" opacity="0.15"/>
  <line x1="180" y1="12" x2="180" y2="128" stroke="var(--ink)" stroke-width="0.5" opacity="0.15"/>
  <line x1="12" y1="12"  x2="188" y2="12"  stroke="var(--ink)" stroke-width="0.5" opacity="0.15"/>
  <line x1="12" y1="41"  x2="188" y2="41"  stroke="var(--ink)" stroke-width="0.5" opacity="0.15"/>
  <line x1="12" y1="70"  x2="188" y2="70"  stroke="var(--ink)" stroke-width="0.5" opacity="0.15"/>
  <line x1="12" y1="99"  x2="188" y2="99"  stroke="var(--ink)" stroke-width="0.5" opacity="0.15"/>
  <line x1="12" y1="128" x2="188" y2="128" stroke="var(--ink)" stroke-width="0.5" opacity="0.15"/>

  <!-- Ghost tissue / peripheral cells -->
  <g opacity="0.2">
    <circle cx="40" cy="26" r="16" fill="none" stroke="var(--ink)" stroke-width="1"/>
    <circle cx="160" cy="30" r="14" fill="none" stroke="var(--ink)" stroke-width="1"/>
    <circle cx="166" cy="106" r="16" fill="none" stroke="var(--ink)" stroke-width="1"/>
    <circle cx="38" cy="106" r="14" fill="none" stroke="var(--ink)" stroke-width="1"/>
    <circle cx="26" cy="68" r="12" fill="none" stroke="var(--ink)" stroke-width="1"/>
  </g>

  <!-- Surrounding cells (Tracheids and Secondary Vessels) -->
  <circle cx="70" cy="36" r="18" fill="none" stroke="var(--ink)" stroke-width="1.2"/>
  <circle cx="132" cy="100" r="18" fill="none" stroke="var(--ink)" stroke-width="1.2"/>
  <circle cx="126" cy="40" r="14" fill="none" stroke="var(--ink)" stroke-width="1.2"/>
  <circle cx="72" cy="102" r="14" fill="none" stroke="var(--ink)" stroke-width="1.2"/>

  <!-- Parenchyma cells with animated nuclei -->
  <g>
    <circle cx="54" cy="70" r="12" fill="none" stroke="var(--ink)" stroke-width="1.2"/>
    <circle cx="54" cy="70" r="2.5" fill="var(--ink)" class="anim">
      <animate attributeName="r" values="2.5;4;2.5" dur="4s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"/>
    </circle>
  </g>
  <g>
    <circle cx="142" cy="72" r="12" fill="none" stroke="var(--ink)" stroke-width="1.2"/>
    <circle cx="142" cy="72" r="2.5" fill="var(--ink)" class="anim">
      <animate attributeName="r" values="2.5;4;2.5" dur="4.3s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"/>
    </circle>
  </g>
  <g>
    <circle cx="102" cy="114" r="14" fill="none" stroke="var(--ink)" stroke-width="1.2"/>
    <circle cx="102" cy="114" r="3" fill="var(--ink)" class="anim">
      <animate attributeName="r" values="3;5;3" dur="4.6s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"/>
    </circle>
  </g>
  <g>
    <circle cx="100" cy="28" r="12" fill="none" stroke="var(--ink)" stroke-width="1.2"/>
    <circle cx="100" cy="28" r="2.5" fill="var(--ink)" class="anim">
      <animate attributeName="r" values="2.5;4;2.5" dur="4.1s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"/>
    </circle>
  </g>

  <!-- Central Vessel Element (Live Element) -->
  <circle cx="100" cy="70" r="25" fill="none" stroke="var(--ink)" stroke-width="1.5"/>

</svg>
