<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Methods of Charging a Sphere — Trinity Simulation Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../_shared/projector-mode.css">
  <style>
    :root {
      --bg: #E9EEF2;
      --bg-alt: #DDE6EC;
      --paper: #F8FAFC;
      --ink: #0C1115;
      --ink-soft: #2B333A;
      --ink-mute: #6B7680;
      --rule-soft: rgba(12, 17, 21, 0.14);
      --panel-border: rgba(12, 17, 21, 0.16);
      --dark: #FFFFFF;
      --dark-ink: #0C1115;
      --dark-mute: #4A5560;
      --accent: oklch(0.52 0.12 200);
      --accent-ink: #F7F8FA;
      --sans: "Manrope", system-ui, sans-serif;
      --mono: "JetBrains Mono", ui-monospace, monospace;
      --stage-grid: rgba(12, 17, 21, 0.07);
      --stage-rule: rgba(12, 17, 21, 0.12);
      --negative: #108CFF;
      --positive: #EE5F4B;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    button, select, input { font: inherit; }
    button { cursor: pointer; }

    .app {
      width: 100%;
      max-width: 1280px;
      min-height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--rule-soft);
      border-right: 1px solid var(--rule-soft);
      background: var(--bg);
    }

    /* ── HEADER ── */
    .header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--rule-soft);
      background: var(--paper);
    }

    .eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-mute);
    }

    .sim-title {
      margin-top: 5px;
      font-size: 23px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--ink);
    }

    .head-controls {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-circle {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--rule-soft);
      background: transparent;
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.15s ease, border-color 0.15s ease, opacity 0.15s ease;
    }

    .btn-circle:hover { background: var(--bg-alt); border-color: var(--ink-mute); }
    .btn-circle:active { opacity: 0.65; }

    .btn-circle svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .workspace {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      min-height: 0;
    }

    /* ── STAGE ── */
    .stage-wrap {
      position: relative;
      background:
        radial-gradient(circle at 52% 42%, rgba(16, 140, 255, 0.10), transparent 34%),
        linear-gradient(180deg, #FFFFFF 0%, #F3F7FA 100%);
      min-height: calc(100vh - 63px);
      overflow: hidden;
    }

    .stage-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      box-shadow: inset 0 0 0 1px rgba(12,17,21,0.06), inset 0 -28px 60px rgba(12,17,21,0.06);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    /* ── PARAMS ── */
    .params {
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 18px;
      background: var(--paper);
    }

    .param-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .param-status {
      min-width: 0;
    }

    .label-mono {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-mute);
    }

    .method-tabs {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
    }

    .method-tab {
      height: 38px;
      padding: 0 14px;
      border-radius: 8px;
      border: 1px solid var(--rule-soft);
      background: transparent;
      color: var(--ink);
      font-size: 14px;
      font-weight: 500;
      text-align: left;
      transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }

    .method-tab:hover { border-color: var(--ink-mute); background: var(--bg-alt); }

    .method-tab.active {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    select {
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--rule-soft);
      border-radius: 8px;
      background: var(--bg);
      color: var(--ink);
      font-size: 14px;
      cursor: pointer;
      outline: none;
      min-width: 0;
      width: 100%;
    }

    select:focus { border-color: var(--ink-mute); }

    .status-text {
      font-size: 13px;
      color: var(--ink-soft);
      line-height: 1.55;
      max-width: 100%;
    }

    .control-rail {
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--rule-soft);
      background: var(--paper);
    }

    /* ── PROMPT ── */
    .prompt {
      margin: auto 18px 18px;
      padding: 14px 15px;
      border: 1px solid var(--rule-soft);
      border-radius: 8px;
      background: var(--bg);
      font-size: 13px;
      color: var(--ink-soft);
      line-height: 1.5;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      .workspace {
        grid-template-columns: 1fr;
      }
      .stage-wrap {
        min-height: 520px;
        border-bottom: 1px solid var(--rule-soft);
      }
      .control-rail {
        border-left: 0;
      }
      .params {
        padding: 14px 16px;
        gap: 14px;
      }
      .method-tabs {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .method-tab {
        text-align: center;
      }
      .prompt {
        margin: 0 16px 16px;
      }
    }

    @media (min-width: 861px) {
      body {
        overflow: hidden;
      }
    }

    @media (max-width: 700px) {
      .sim-title { font-size: 20px; }
      .method-tabs { flex-wrap: wrap; }
      select { min-width: 100%; }
      .param-status { min-width: 100%; }
      .stage-wrap { min-height: 420px; }
    }

    @media (max-width: 420px) {
      .header { padding: 10px 14px; }
      .sim-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <div class="eyebrow">Simulation · Physics</div>
        <div class="sim-title">Methods of Charging a Sphere</div>
      </div>
      <div class="head-controls">
        <button class="btn-circle" id="centerBtn" title="Centre objects">
          <!-- crosshair / centre icon -->
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
          </svg>
        </button>
        <button class="btn-circle" id="resetBtn" title="Reset">
          <!-- reset/refresh icon -->
          <svg viewBox="0 0 24 24">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="workspace">
      <div class="stage-wrap">
        <canvas id="canvas"></canvas>
      </div>

      <aside class="control-rail">
        <div class="params">
          <div class="param-block">
            <div class="label-mono">Method</div>
            <div class="method-tabs">
              <button class="method-tab active" data-mode="friction">Friction</button>
              <button class="method-tab" data-mode="conduction">Conduction</button>
              <button class="method-tab" data-mode="induction">Induction</button>
            </div>
          </div>

          <div class="param-block">
            <div class="label-mono">Case</div>
            <select id="caseSelect"></select>
          </div>

          <div class="param-block param-status">
            <div class="label-mono" id="statusTitle">Status</div>
            <div class="status-text" id="statusText">Drag the cloth over the sphere repeatedly to transfer electrons.</div>
          </div>
        </div>

        <div class="prompt" id="hintText">Drag the cloth over the sphere repeatedly.</div>
      </aside>
    </main>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const caseSelect = document.getElementById("caseSelect");
    const tabs = document.querySelectorAll(".method-tab");
    const resetBtn = document.getElementById("resetBtn");
    const centerBtn = document.getElementById("centerBtn");
    const statusTitle = document.getElementById("statusTitle");
    const statusText = document.getElementById("statusText");
    const hintText = document.getElementById("hintText");

    // Canvas colour constants — mirrors the CSS design tokens
    const C = {
      ink:      '#0C1115',
      inkSoft:  '#2B333A',
      inkMute:  '#6B7680',
      dark:     '#FFFFFF',
      darkMute: '#4A5560',
      accent:   '#1A9898',   // ≈ oklch(0.52 0.12 200)
      negative: '#108CFF',
      negativeSoft: 'rgba(16,140,255,0.14)',
      positive: '#EE5F4B',
      positiveSoft: 'rgba(238,95,75,0.16)',
      bg:       '#EFF2F5',
      bgAlt:    '#E2E7EC',
      paper:    '#F7F8FA',
      stageGrid:'rgba(12,17,21,0.07)',
      stageGlow:'rgba(16,140,255,0.08)',
    };

    let mode = "friction";
    let caseIndex = 0;
    let dpr = Math.max(1, window.devicePixelRatio || 1);
    let W = 900, H = 520;
    let time = 0;

    const sim = {
      sphere: { x: 0, y: 0, r: 72, charge: 0, targetCharge: 0 },
      rod:    { x: 0, y: 0, w: 200, h: 44, dragging: false },
      cloth:  { x: 0, y: 0, w: 148, h: 84, dragging: false, lastX: 0, lastY: 0, rubProgress: 0 },
      ground: { x: 0, y: 0, dragging: false, connected: false },
      particles: [],
      pointer: { x: 0, y: 0, down: false, target: null, dx: 0, dy: 0 },
      induction: { near: false, groundedBefore: false, polarized: false, inducedFinalized: false }
    };

    const CONFIG = {
      friction: {
        label: "Friction",
        cases: [
          { name: "Glass + silk: sphere becomes +", otherName: "Silk cloth",  finalSign: +1, electronDir: "sphereToOther", otherType: "silk" },
          { name: "Ebonite + fur: sphere becomes −", otherName: "Fur cloth",  finalSign: -1, electronDir: "otherToSphere", otherType: "fur"  }
        ]
      },
      conduction: {
        label: "Conduction",
        cases: [
          { name: "Touch + rod: sphere becomes +", rodName: "Positive rod", rodCharge: +1, finalSign: +1, electronDir: "sphereToRod" },
          { name: "Touch − rod: sphere becomes −", rodName: "Negative rod", rodCharge: -1, finalSign: -1, electronDir: "rodToSphere" }
        ]
      },
      induction: {
        label: "Induction",
        cases: [
          { name: "+ rod nearby: final sphere −", rodName: "Positive rod", rodCharge: +1, finalSign: -1, groundFlow: "earthToSphere" },
          { name: "− rod nearby: final sphere +", rodName: "Negative rod", rodCharge: -1, finalSign: +1, groundFlow: "sphereToEarth" }
        ]
      }
    };

    // ── SETUP ──────────────────────────────────────────────────────

    function resizeCanvas() {
      const wrap = canvas.parentElement;
      const rect = wrap.getBoundingClientRect();
      W = rect.width;
      H = rect.height;
      dpr = Math.max(1, window.devicePixelRatio || 1);
      canvas.width  = Math.round(W * dpr);
      canvas.height = Math.round(H * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      centerObjects();
    }

    function currentCase() { return CONFIG[mode].cases[caseIndex]; }

    function setMode(nextMode) {
      mode = nextMode;
      caseIndex = 0;
      tabs.forEach(t => t.classList.toggle("active", t.dataset.mode === mode));
      populateCases();
      resetSimulation();
    }

    function populateCases() {
      caseSelect.innerHTML = "";
      CONFIG[mode].cases.forEach((c, i) => {
        const o = document.createElement("option");
        o.value = i;
        o.textContent = c.name;
        caseSelect.appendChild(o);
      });
      caseSelect.value = caseIndex;
    }

    function centerObjects() {
      const narrow = W < 520;
      sim.sphere.x = W * 0.52;
      sim.sphere.y = H * 0.50;
      sim.sphere.r = Math.min(112, Math.max(72, W * 0.13));
      sim.rod.w = Math.min(245, Math.max(180, W * 0.28));
      sim.rod.h = 50;
      sim.cloth.w = narrow ? Math.max(116, W * 0.30) : Math.min(198, Math.max(150, W * 0.21));
      sim.cloth.h = narrow ? 78 : 104;
      sim.rod.x = clamp(W * 0.09, 16, Math.max(16, W - sim.rod.w - 18));
      sim.rod.y = H * 0.42;
      sim.cloth.x = clamp(W * 0.66, 16, Math.max(16, W - sim.cloth.w - 18));
      sim.cloth.y = narrow ? H * 0.34 : H * 0.36;
      sim.ground.x = W * 0.78;
      sim.ground.y = H * 0.67;
    }

    function resetSimulation() {
      sim.sphere.charge = 0;
      sim.sphere.targetCharge = 0;
      sim.particles = [];
      sim.cloth.rubProgress = 0;
      sim.induction.near = false;
      sim.induction.groundedBefore = false;
      sim.induction.polarized = false;
      sim.induction.inducedFinalized = false;
      sim.ground.connected = false;
      centerObjects();
      updateText();
    }

    // ── HELPERS ────────────────────────────────────────────────────

    function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
    function dist(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }
    function rectContains(x, y, rx, ry, rw, rh) {
      return x >= rx && x <= rx + rw && y >= ry && y <= ry + rh;
    }
    function rodTip() {
      return { x: sim.rod.x + sim.rod.w, y: sim.rod.y + sim.rod.h / 2 };
    }
    function sphereRodPort() {
      return { x: sim.sphere.x - sim.sphere.r * 0.95, y: sim.sphere.y };
    }
    function sphereGroundPort() {
      return { x: sim.sphere.x + sim.sphere.r * 0.88, y: sim.sphere.y + sim.sphere.r * 0.22 };
    }
    function groundLeadPoint() {
      return { x: sim.ground.x, y: sim.ground.y - 24 };
    }
    function easeInOut(t) {
      return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }

    function pointInRod(x, y)    { return rectContains(x, y, sim.rod.x,   sim.rod.y,   sim.rod.w, sim.rod.h); }
    function pointInCloth(x, y)  { return rectContains(x, y, sim.cloth.x, sim.cloth.y, sim.cloth.w, sim.cloth.h); }
    function pointInGround(x, y) {
      const lead = groundLeadPoint();
      return dist(x, y, sim.ground.x, sim.ground.y) <= 42 || dist(x, y, lead.x, lead.y) <= 42;
    }

    function getCanvasPoint(e) {
      const r = canvas.getBoundingClientRect();
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }

    // ── INTERACTION ────────────────────────────────────────────────

    canvas.addEventListener("pointerdown", (e) => {
      const p = getCanvasPoint(e);
      sim.pointer.down = true;
      sim.pointer.x = p.x;
      sim.pointer.y = p.y;

      if (mode === "friction" && pointInCloth(p.x, p.y)) {
        sim.pointer.target = "cloth";
        sim.pointer.dx = p.x - sim.cloth.x;
        sim.pointer.dy = p.y - sim.cloth.y;
        sim.cloth.dragging = true;
        sim.cloth.lastX = sim.cloth.x;
        sim.cloth.lastY = sim.cloth.y;
      } else if ((mode === "conduction" || mode === "induction") && pointInRod(p.x, p.y)) {
        sim.pointer.target = "rod";
        sim.pointer.dx = p.x - sim.rod.x;
        sim.pointer.dy = p.y - sim.rod.y;
        sim.rod.dragging = true;
      } else if (mode === "induction" && pointInGround(p.x, p.y)) {
        sim.pointer.target = "ground";
        sim.pointer.dx = p.x - sim.ground.x;
        sim.pointer.dy = p.y - sim.ground.y;
        sim.ground.dragging = true;
      }
    });

    canvas.addEventListener("pointermove", (e) => {
      const p = getCanvasPoint(e);
      sim.pointer.x = p.x;
      sim.pointer.y = p.y;
      if (!sim.pointer.down) return;

      if (sim.pointer.target === "cloth") {
        sim.cloth.x = clamp(p.x - sim.pointer.dx, 0, W - sim.cloth.w);
        sim.cloth.y = clamp(p.y - sim.pointer.dy, 50, H - sim.cloth.h - 20);
        const d = dist(sim.cloth.x + sim.cloth.w * 0.3, sim.cloth.y + sim.cloth.h * 0.5, sim.sphere.x, sim.sphere.y);
        if (d < sim.sphere.r + 55) {
          const move = dist(sim.cloth.x, sim.cloth.y, sim.cloth.lastX, sim.cloth.lastY);
          sim.cloth.rubProgress += move * 0.02;
          if (move > 1.2) emitFrictionParticles();
          if (sim.cloth.rubProgress > 18) sim.sphere.targetCharge = currentCase().finalSign;
        }
        sim.cloth.lastX = sim.cloth.x;
        sim.cloth.lastY = sim.cloth.y;
      }

      if (sim.pointer.target === "rod") {
        sim.rod.x = clamp(p.x - sim.pointer.dx, 0, W - sim.rod.w);
        sim.rod.y = clamp(p.y - sim.pointer.dy, 50, H - sim.rod.h - 40);
      }

      if (sim.pointer.target === "ground") {
        sim.ground.x = clamp(p.x - sim.pointer.dx, 20, W - 20);
        sim.ground.y = clamp(p.y - sim.pointer.dy, 50, H - 20);
        const port = sphereGroundPort();
        const lead = groundLeadPoint();
        if (dist(lead.x, lead.y, port.x, port.y) < 72) {
          sim.ground.x = port.x;
          sim.ground.y = port.y + 24;
        }
      }
    });

    window.addEventListener("pointerup", () => {
      sim.pointer.down = false;
      sim.pointer.target = null;
      sim.cloth.dragging = false;
      sim.rod.dragging = false;
      sim.ground.dragging = false;
    });

    // ── PARTICLES ──────────────────────────────────────────────────

    function emitParticle(x1, y1, x2, y2, speed = 0.028) {
      sim.particles.push({
        x1, y1, x2, y2,
        t: 0,
        speed: speed + Math.random() * 0.012,
        size: 5 + Math.random() * 1.5,
        arcDir: Math.random() > 0.5 ? 1 : -1,
        arcAmp: 10 + Math.random() * 12,
      });
    }

    function emitFrictionParticles() {
      const c = currentCase();
      const sx = sim.sphere.x + sim.sphere.r * 0.6, sy = sim.sphere.y;
      const ox = sim.cloth.x + 22, oy = sim.cloth.y + sim.cloth.h * 0.5;
      if (c.electronDir === "sphereToOther") {
        for (let i = 0; i < 2; i++) emitParticle(sx, sy, ox, oy, 0.038);
      } else {
        for (let i = 0; i < 2; i++) emitParticle(ox, oy, sx, sy, 0.038);
      }
    }

    function emitConductionParticles() {
      const c = currentCase();
      const lx = sim.sphere.x - sim.sphere.r + 8, rx = sim.rod.x + sim.rod.w - 12, y = sim.sphere.y;
      if (c.electronDir === "sphereToRod") {
        for (let i = 0; i < 3; i++) emitParticle(lx, y, rx, y, 0.032);
      } else {
        for (let i = 0; i < 3; i++) emitParticle(rx, y, lx, y, 0.032);
      }
    }

    function emitInductionGroundParticles() {
      const c = currentCase();
      const port = sphereGroundPort();
      const lead = groundLeadPoint();
      const sx = port.x, sy = port.y;
      const gx = lead.x, gy = lead.y;
      if (c.groundFlow === "earthToSphere") {
        for (let i = 0; i < 3; i++) emitParticle(gx, gy, sx, sy, 0.026);
      } else {
        for (let i = 0; i < 3; i++) emitParticle(sx, sy, gx, gy, 0.026);
      }
    }

    // ── PHYSICS ────────────────────────────────────────────────────

    function updatePhysics() {
      time += 1;

      // smooth charge lerp
      sim.sphere.charge += (sim.sphere.targetCharge - sim.sphere.charge) * 0.12;
      if (Math.abs(sim.sphere.charge - sim.sphere.targetCharge) < 0.01) {
        sim.sphere.charge = sim.sphere.targetCharge;
      }

      if (mode === "conduction") {
        const touching = sim.rod.x + sim.rod.w >= sim.sphere.x - sim.sphere.r &&
                         sim.rod.x < sim.sphere.x &&
                         Math.abs((sim.rod.y + sim.rod.h / 2) - sim.sphere.y) < sim.sphere.r;
        if (touching) {
          if (Math.random() < 0.45) emitConductionParticles();
          sim.sphere.targetCharge = currentCase().finalSign;
        }
      }

      if (mode === "induction") {
        const tip = rodTip();
        const rodPort = sphereRodPort();
        const rodNear = dist(tip.x, tip.y, rodPort.x, rodPort.y) < Math.max(132, sim.sphere.r * 1.42);
        sim.induction.near = rodNear;
        sim.induction.polarized = rodNear;

        const lead = groundLeadPoint();
        const groundPort = sphereGroundPort();
        const groundConn = dist(lead.x, lead.y, groundPort.x, groundPort.y) < 58;
        sim.ground.connected = groundConn;

        if (rodNear && groundConn) {
          sim.induction.groundedBefore = true;
          if (Math.random() < 0.68) emitInductionGroundParticles();
        }

        if (rodNear && sim.induction.groundedBefore && !groundConn) {
          sim.sphere.targetCharge = currentCase().finalSign;
          sim.induction.inducedFinalized = true;
        }

        if (!rodNear && !sim.induction.inducedFinalized) {
          sim.sphere.targetCharge = 0;
          sim.induction.groundedBefore = false;
        }
      }

      for (let i = sim.particles.length - 1; i >= 0; i--) {
        const p = sim.particles[i];
        p.t += p.speed;
        if (p.t >= 1) sim.particles.splice(i, 1);
      }

      updateText();
    }

    // ── DRAWING ────────────────────────────────────────────────────

    function drawGrid() {
      const step = 40;
      ctx.save();
      ctx.strokeStyle = C.stageGrid;
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= W; x += step) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = 0; y <= H; y += step) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }
      ctx.restore();
    }

    function drawStageAtmosphere() {
      const glow = ctx.createRadialGradient(W * 0.52, H * 0.45, 20, W * 0.52, H * 0.45, Math.max(W, H) * 0.65);
      glow.addColorStop(0, 'rgba(16,140,255,0.10)');
      glow.addColorStop(0.44, 'rgba(238,95,75,0.05)');
      glow.addColorStop(1, 'rgba(12,17,21,0)');
      ctx.save();
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, W, H);

      const deckY = H * 0.66;
      const deck = ctx.createLinearGradient(0, deckY, 0, H);
      deck.addColorStop(0, 'rgba(12,17,21,0)');
      deck.addColorStop(0.26, 'rgba(16,140,255,0.035)');
      deck.addColorStop(1, 'rgba(12,17,21,0.075)');
      ctx.fillStyle = deck;
      ctx.fillRect(0, deckY, W, H - deckY);

      ctx.strokeStyle = 'rgba(12,17,21,0.08)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, deckY);
      ctx.lineTo(W, deckY);
      ctx.stroke();
      ctx.restore();
    }

    function chargeColor(sign, alpha = 1) {
      if (sign > 0) return alpha === 1 ? C.positive : `rgba(238,95,75,${alpha})`;
      return alpha === 1 ? C.negative : `rgba(16,140,255,${alpha})`;
    }

    function roundRect(x, y, w, h, r, fill, stroke, sw) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      if (fill)   { ctx.fillStyle = fill; ctx.fill(); }
      if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = sw || 1.2; ctx.stroke(); }
    }

    function label(text, x, y, size, color, align, mono) {
      ctx.save();
      ctx.font = mono
        ? `500 ${size}px "JetBrains Mono", monospace`
        : `500 ${size}px "Manrope", sans-serif`;
      ctx.fillStyle = color;
      ctx.textAlign = align || "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, x, y);
      ctx.restore();
    }

    function plus(x, y, size, color) {
      ctx.save();
      ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(x - size / 2, y); ctx.lineTo(x + size / 2, y);
      ctx.moveTo(x, y - size / 2); ctx.lineTo(x, y + size / 2);
      ctx.stroke();
      ctx.restore();
    }

    function minus(x, y, size, color) {
      ctx.save();
      ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(x - size / 2, y); ctx.lineTo(x + size / 2, y);
      ctx.stroke();
      ctx.restore();
    }

    function drawArrow(x1, y1, x2, y2, text, color) {
      ctx.save();
      ctx.strokeStyle = color; ctx.fillStyle = color;
      ctx.lineWidth = 2; ctx.lineCap = "round";
      ctx.setLineDash([8, 7]);
      ctx.lineDashOffset = -time * 0.35;
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
      ctx.setLineDash([]);
      const ang = Math.atan2(y2 - y1, x2 - x1), h = 8;
      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - h * Math.cos(ang - Math.PI / 6), y2 - h * Math.sin(ang - Math.PI / 6));
      ctx.lineTo(x2 - h * Math.cos(ang + Math.PI / 6), y2 - h * Math.sin(ang + Math.PI / 6));
      ctx.closePath(); ctx.fill();
      label(text, (x1 + x2) / 2, (y1 + y2) / 2 - 13, 11, color, "center", true);
      ctx.restore();
    }

    function drawChargeField() {
      const activeCharge = Math.abs(sim.sphere.charge) > 0.08 || (mode === "induction" && sim.induction.polarized);
      const x = sim.sphere.x, y = sim.sphere.y, r = sim.sphere.r;

      if (!activeCharge) {
        ctx.save();
        ctx.lineWidth = 1.1;
        ctx.setLineDash([10, 12]);
        ctx.lineDashOffset = -time * 0.12;
        for (let i = 0; i < 4; i++) {
          const radius = r + 28 + i * 24;
          ctx.globalAlpha = 0.18 - i * 0.025;
          ctx.strokeStyle = i % 2 === 0 ? C.negative : C.positive;
          ctx.beginPath();
          ctx.ellipse(x, y, radius * 1.18, radius * 0.74, i % 2 ? -0.34 : 0.34, 0.25, Math.PI * 1.75);
          ctx.stroke();
        }
        ctx.restore();
        return;
      }

      const sign = sim.sphere.charge > 0.08 ? +1 : sim.sphere.charge < -0.08 ? -1 : currentCase().finalSign || +1;
      const color = chargeColor(sign, 0.22);
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.3;
      for (let i = 0; i < 3; i++) {
        const radius = r + 20 + i * 23 + Math.sin(time * 0.035 + i) * 3;
        ctx.globalAlpha = 0.55 - i * 0.12;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0.18 + time * 0.003 * (i + 1), Math.PI * 1.72 + time * 0.003 * (i + 1));
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawInductionGuides() {
      if (mode !== "induction") return;

      const tip = rodTip();
      const rodPort = sphereRodPort();
      const groundPort = sphereGroundPort();
      const lead = groundLeadPoint();
      const rodReady = sim.induction.near;
      const groundDistance = dist(lead.x, lead.y, groundPort.x, groundPort.y);
      const groundReady = groundDistance < 96 || sim.ground.connected;
      const pulse = Math.sin(time * 0.1) * 0.5 + 0.5;

      ctx.save();
      ctx.lineWidth = 1.4;
      ctx.lineCap = "round";

      if (rodReady) {
        for (let i = 0; i < 4; i++) {
          const t = (time * 0.018 + i * 0.25) % 1;
          const yShift = (i - 1.5) * 18;
          ctx.globalAlpha = 0.25 + t * 0.28;
          ctx.strokeStyle = currentCase().rodCharge > 0 ? C.positive : C.negative;
          ctx.setLineDash([12, 12]);
          ctx.lineDashOffset = -time * 0.45;
          ctx.beginPath();
          ctx.moveTo(tip.x - 6, tip.y + yShift);
          ctx.quadraticCurveTo((tip.x + rodPort.x) / 2, tip.y + yShift - 24,
                                rodPort.x, rodPort.y + yShift * 0.35);
          ctx.stroke();
        }
      }

      if (!sim.induction.inducedFinalized) {
        ctx.setLineDash([]);
        ctx.globalAlpha = rodReady ? 0.95 : 0.30;
        ctx.strokeStyle = rodReady ? C.accent : C.inkMute;
        ctx.fillStyle = rodReady ? `rgba(26,152,152,${0.10 + pulse * 0.12})` : 'rgba(12,17,21,0.04)';
        ctx.lineWidth = rodReady ? 2 : 1.2;
        ctx.beginPath();
        ctx.arc(groundPort.x, groundPort.y, 14 + pulse * 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        if (rodReady && !sim.ground.connected) {
          label("ground here", groundPort.x + 4, groundPort.y + 30, 10, C.accent, "center", true);
        }
      }

      if (groundReady && !sim.ground.connected && !sim.induction.inducedFinalized) {
        ctx.globalAlpha = 0.45;
        ctx.strokeStyle = C.accent;
        ctx.setLineDash([6, 8]);
        ctx.lineDashOffset = -time * 0.42;
        ctx.beginPath();
        ctx.moveTo(lead.x, lead.y);
        ctx.quadraticCurveTo((lead.x + groundPort.x) / 2, Math.min(lead.y, groundPort.y) - 52,
                              groundPort.x, groundPort.y);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawSphere() {
      const x = sim.sphere.x, y = sim.sphere.y, r = sim.sphere.r;

      ctx.save();
      ctx.shadowColor = 'rgba(12,17,21,0.18)';
      ctx.shadowBlur = 26;
      ctx.shadowOffsetY = 14;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      const shell = ctx.createRadialGradient(x - r * 0.38, y - r * 0.48, r * 0.10, x, y, r);
      shell.addColorStop(0, '#FFFFFF');
      shell.addColorStop(0.48, '#F6FAFD');
      shell.addColorStop(1, '#DCE7EF');
      ctx.fillStyle = shell;
      ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.strokeStyle = C.inkMute;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.globalAlpha = 0.55;
      ctx.strokeStyle = 'rgba(255,255,255,0.9)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x - r * 0.18, y - r * 0.18, r * 0.62, Math.PI * 1.05, Math.PI * 1.7);
      ctx.stroke();
      ctx.restore();

      // induction polarisation overlay
      if (mode === "induction" && sim.induction.polarized && !sim.induction.inducedFinalized) {
        const pulse = (Math.sin(time * 0.07) * 0.5 + 0.5) * 0.14 + 0.05;
        const nearNeg = currentCase().rodCharge === +1;
        ctx.save();
        ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.clip();
        ctx.fillStyle = nearNeg
          ? `rgba(16,140,255,${pulse})`
          : `rgba(238,95,75,${pulse})`;
        ctx.fillRect(x - r, y - r, r, r * 2);
        ctx.fillStyle = nearNeg
          ? `rgba(238,95,75,${pulse})`
          : `rgba(16,140,255,${pulse})`;
        ctx.fillRect(x, y - r, r, r * 2);
        ctx.restore();

        for (let i = 0; i < 5; i++) {
          const yy = y - r * 0.40 + i * r * 0.20 + Math.sin(time * 0.09 + i) * 3;
          const drift = Math.sin(time * 0.055 + i * 1.4) * 4;
          if (nearNeg) {
            minus(x - r * 0.40 - drift, yy, 11, C.negative);
            plus(x + r * 0.40 + drift, yy, 11, C.positive);
          } else {
            plus(x - r * 0.40 - drift, yy, 11, C.positive);
            minus(x + r * 0.40 + drift, yy, 11, C.negative);
          }
        }
      }

      // net charge markers
      if (Math.abs(sim.sphere.charge) > 0.12) {
        const sign = sim.sphere.charge > 0 ? +1 : -1;
        for (let i = 0; i < 10; i++) {
          const a = (i / 10) * Math.PI * 2 + 0.15 + time * 0.012 * sign;
          const px = x + Math.cos(a) * r * 0.58;
          const py = y + Math.sin(a) * r * 0.58;
          if (sign > 0) plus(px, py, 13, C.positive);
          else minus(px, py, 13, C.negative);
        }
      } else if (!(mode === "induction" && sim.induction.polarized)) {
        for (let i = 0; i < 5; i++) {
          const a = (i / 5) * Math.PI * 2 + 0.25;
          plus(x + Math.cos(a) * r * 0.38, y + Math.sin(a) * r * 0.38, 11, C.inkMute);
          minus(x + Math.cos(a + 0.5) * r * 0.18, y + Math.sin(a + 0.5) * r * 0.18, 11, C.inkMute);
        }
      }

      label("Sphere", x, y + r + 20, 12, C.inkMute, "center", false);

      // stand
      ctx.save();
      ctx.fillStyle = 'rgba(12,17,21,0.12)';
      ctx.beginPath();
      ctx.ellipse(x, y + r + 70, 74, 11, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = C.inkMute; ctx.lineWidth = 5; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(x, y + r + 4); ctx.lineTo(x, y + r + 64); ctx.stroke();
      roundRect(x - 40, y + r + 57, 80, 12, 6, C.bgAlt, C.inkMute, 1);
      ctx.restore();
    }

    function drawRod() {
      const c = currentCase();
      const x = sim.rod.x, y = sim.rod.y, w = sim.rod.w, h = sim.rod.h;
      const positive = c.rodCharge === +1;
      const grad = ctx.createLinearGradient(x, y, x + w, y + h);
      grad.addColorStop(0, positive ? '#FFF2EF' : '#EEF7FF');
      grad.addColorStop(0.55, '#FFFFFF');
      grad.addColorStop(1, positive ? '#F5B6AA' : '#A9D5FF');
      ctx.save();
      ctx.shadowColor = positive ? 'rgba(238,95,75,0.20)' : 'rgba(16,140,255,0.22)';
      ctx.shadowBlur = sim.rod.dragging ? 24 : 14;
      ctx.shadowOffsetY = 8;
      roundRect(x, y, w, h, 10, grad, positive ? C.positive : C.negative, 1.3);
      ctx.restore();
      ctx.save();
      ctx.fillStyle = 'rgba(12,17,21,0.10)';
      ctx.beginPath();
      ctx.ellipse(x + w / 2, y + h + 34, w * 0.42, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      for (let i = 0; i < 5; i++) {
        const px = x + 20 + i * ((w - 40) / 4);
        if (positive) plus(px, y + h / 2, 12, C.positive);
        else minus(px, y + h / 2, 12, C.negative);
      }
      label(c.rodName, x + w / 2, y + h + 20, 12, C.inkMute, "center", false);
    }

    function drawCloth() {
      const c = currentCase();
      const x = sim.cloth.x, y = sim.cloth.y, w = sim.cloth.w, h = sim.cloth.h;

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(x + 10, y + 6);
      const flutter = sim.cloth.dragging ? Math.sin(time * 0.16) * 5 : Math.sin(time * 0.035) * 1.5;
      ctx.bezierCurveTo(x + w * 0.35, y - 7 + flutter, x + w * 0.68, y + 14 - flutter, x + w - 8, y + 2);
      ctx.lineTo(x + w, y + h - 8);
      ctx.bezierCurveTo(x + w * 0.62, y + h + 8, x + w * 0.32, y + h - 10, x + 4, y + h + 4);
      ctx.closePath();
      const clothGrad = ctx.createLinearGradient(x, y, x + w, y + h);
      clothGrad.addColorStop(0, '#F2F7F9');
      clothGrad.addColorStop(1, c.otherType === "silk" ? '#DDEBF2' : '#E9E1D7');
      ctx.shadowColor = 'rgba(12,17,21,0.14)';
      ctx.shadowBlur = sim.cloth.dragging ? 18 : 10;
      ctx.shadowOffsetY = 8;
      ctx.fillStyle = clothGrad;
      ctx.fill();
      ctx.shadowColor = 'transparent';
      ctx.strokeStyle = C.inkMute;
      ctx.lineWidth = 1.2;
      ctx.stroke();

      // subtle texture lines
      ctx.strokeStyle = 'rgba(12,17,21,0.08)';
      ctx.lineWidth = 1;
      for (let i = 1; i < 4; i++) {
        const lx = x + (w / 4) * i;
        ctx.beginPath(); ctx.moveTo(lx, y + 4); ctx.lineTo(lx, y + h - 4); ctx.stroke();
      }
      ctx.strokeStyle = 'rgba(255,255,255,0.42)';
      for (let i = 1; i < 3; i++) {
        const ly = y + (h / 3) * i;
        ctx.beginPath(); ctx.moveTo(x + 10, ly); ctx.bezierCurveTo(x + w * 0.35, ly - 6, x + w * 0.62, ly + 5, x + w - 8, ly - 2); ctx.stroke();
      }
      ctx.restore();

      label(c.otherName, x + w / 2, y + h + 22, 12, C.inkMute, "center", false);
    }

    function drawGround() {
      const x = sim.ground.x, y = sim.ground.y;
      const color = sim.ground.connected ? C.accent : C.inkMute;

      ctx.save();
      if (sim.ground.connected) {
        ctx.shadowColor = 'rgba(26,152,152,0.45)';
        ctx.shadowBlur = 20 + Math.sin(time * 0.12) * 6;
      }
      ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(x, y - 24); ctx.lineTo(x, y + 14);
      ctx.moveTo(x - 26, y + 14); ctx.lineTo(x + 26, y + 14);
      ctx.moveTo(x - 17, y + 24); ctx.lineTo(x + 17, y + 24);
      ctx.moveTo(x - 8,  y + 34); ctx.lineTo(x + 8,  y + 34);
      ctx.stroke();
      ctx.restore();

      label("Ground", x, y + 52, 12, color, "center", false);

      if (sim.ground.connected) {
        const port = sphereGroundPort();
        const lead = groundLeadPoint();
        ctx.save();
        ctx.strokeStyle = C.accent;
        ctx.lineWidth = 3;
        ctx.shadowColor = 'rgba(26,152,152,0.40)';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.moveTo(lead.x, lead.y);
        ctx.quadraticCurveTo((lead.x + port.x) / 2, Math.min(lead.y, port.y) - 60,
                              port.x, port.y);
        ctx.stroke();
        ctx.shadowColor = 'transparent';
        ctx.setLineDash([4, 12]);
        ctx.lineDashOffset = -time * 1.4;
        ctx.strokeStyle = '#FFFFFF';
        ctx.lineWidth = 1.6;
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawParticles() {
      for (const p of sim.particles) {
        const t = p.t;
        const ease = easeInOut(t);

        // perpendicular arc
        const dx = p.x2 - p.x1, dy = p.y2 - p.y1;
        const len = Math.hypot(dx, dy) || 1;
        const nx = -dy / len, ny = dx / len;
        const arc = Math.sin(t * Math.PI) * p.arcAmp * p.arcDir;

        const px = p.x1 + dx * ease + nx * arc;
        const py = p.y1 + dy * ease + ny * arc;
        const prevT = Math.max(0, t - 0.10);
        const prevEase = easeInOut(prevT);
        const prevArc = Math.sin(prevT * Math.PI) * p.arcAmp * p.arcDir;
        const tx = p.x1 + dx * prevEase + nx * prevArc;
        const ty = p.y1 + dy * prevEase + ny * prevArc;

        // fade envelope: in 0–0.2, full 0.2–0.7, out 0.7–1
        let alpha;
        if (t < 0.2)      alpha = t / 0.2;
        else if (t < 0.7) alpha = 1;
        else               alpha = 1 - (t - 0.7) / 0.3;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = 'rgba(16,140,255,0.45)';
        ctx.lineWidth = p.size * 0.9;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(tx, ty);
        ctx.lineTo(px, py);
        ctx.stroke();
        ctx.shadowColor = 'rgba(16,140,255,0.65)';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(px, py, p.size, 0, Math.PI * 2);
        ctx.fillStyle = C.negative;
        ctx.fill();
        ctx.strokeStyle = C.dark;
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.fillStyle = C.dark;
        ctx.font = '600 9px "JetBrains Mono", monospace';
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("−", px, py + 0.5);
        ctx.restore();
      }
    }

    function drawReadouts() {
      const chargeLabel = sim.sphere.charge > 0.25 ? "Positive"
                        : sim.sphere.charge < -0.25 ? "Negative"
                        : "Neutral";
      const lines = [
        `SPHERE  ${chargeLabel}`,
        `MODE    ${CONFIG[mode].label.toUpperCase()}`,
      ];
      ctx.save();
      ctx.font = '500 10px "JetBrains Mono", monospace';
      ctx.fillStyle = C.darkMute;
      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      lines.forEach((line, i) => ctx.fillText(line, 14, 14 + i * 16));
      ctx.restore();
    }

    // ── SCENE ──────────────────────────────────────────────────────

    function drawScene() {
      ctx.clearRect(0, 0, W, H);
      drawStageAtmosphere();
      drawGrid();
      drawChargeField();
      drawSphere();
      drawInductionGuides();

      if (mode === "friction") {
        drawCloth();
        if (sim.cloth.rubProgress > 2 && sim.cloth.rubProgress < 18) {
          const fromSphere = currentCase().electronDir === "sphereToOther";
          const sx = sim.sphere.x + sim.sphere.r + 8, sy = sim.sphere.y - 6;
          const ex = sim.cloth.x + 14, ey = sim.cloth.y + sim.cloth.h / 2;
          drawArrow(fromSphere ? sx : ex, fromSphere ? sy : ey,
                    fromSphere ? ex : sx, fromSphere ? ey : sy,
                    "e⁻ flow", C.accent);
        }
      }

      if (mode === "conduction") {
        drawRod();
        const touching = sim.rod.x + sim.rod.w >= sim.sphere.x - sim.sphere.r &&
                         sim.rod.x < sim.sphere.x &&
                         Math.abs((sim.rod.y + sim.rod.h / 2) - sim.sphere.y) < sim.sphere.r;
        if (touching) label("Contact", sim.sphere.x - sim.sphere.r - 28, sim.sphere.y - 24, 11, C.inkMute, "center", true);
      }

      if (mode === "induction") {
        drawRod();
        drawGround();
        if (sim.induction.near && !sim.ground.connected && !sim.induction.inducedFinalized) {
          label("Charges separating inside sphere",
                sim.sphere.x, sim.sphere.y - sim.sphere.r - 24, 11, C.inkMute, "center", true);
        }
        if (sim.ground.connected) {
          const toSphere = currentCase().groundFlow === "earthToSphere";
          const lead = groundLeadPoint();
          const port = sphereGroundPort();
          const gx = lead.x, gy = lead.y;
          const sx = port.x, sy = port.y;
          drawArrow(toSphere ? gx : sx, toSphere ? gy : sy,
                    toSphere ? sx : gx, toSphere ? sy : gy,
                    toSphere ? "e⁻ from earth" : "e⁻ to earth", C.accent);
        }
      }

      drawParticles();
      drawReadouts();
    }

    // ── TEXT ───────────────────────────────────────────────────────

    function updateText() {
      if (mode === "friction") {
        statusTitle.textContent = "Friction";
        if (sim.sphere.charge > 0.25) {
          statusText.textContent = "The sphere has lost electrons and become positively charged.";
          hintText.textContent = "Charge has transferred. Try resetting and changing the case.";
        } else if (sim.sphere.charge < -0.25) {
          statusText.textContent = "The sphere has gained electrons and become negatively charged.";
          hintText.textContent = "Charge has transferred. Try resetting and changing the case.";
        } else {
          statusText.textContent = "Rub the material over the sphere repeatedly to transfer electrons.";
          hintText.textContent = "Drag the cloth over the sphere — what do you notice about the direction of electron flow?";
        }
      }

      if (mode === "conduction") {
        statusTitle.textContent = "Conduction";
        if (sim.sphere.charge > 0.25) {
          statusText.textContent = "Electrons flowed from the sphere to the positive rod. The sphere becomes positive.";
          hintText.textContent = "Why does the sphere take the same sign as the rod, not the opposite?";
        } else if (sim.sphere.charge < -0.25) {
          statusText.textContent = "Electrons flowed from the negative rod to the sphere. The sphere becomes negative.";
          hintText.textContent = "Why does the sphere take the same sign as the rod, not the opposite?";
        } else {
          statusText.textContent = "Touch the rod to the sphere so charge can flow by contact.";
          hintText.textContent = "Drag the rod until it touches the sphere.";
        }
      }

      if (mode === "induction") {
        statusTitle.textContent = "Induction";
        if (sim.induction.inducedFinalized && currentCase().finalSign < 0) {
          statusText.textContent = "Sphere gained electrons through grounding — now negative, induced by the positive rod without contact.";
          hintText.textContent = "The sphere charged without ever touching the rod. How does that differ from conduction?";
        } else if (sim.induction.inducedFinalized && currentCase().finalSign > 0) {
          statusText.textContent = "Sphere lost electrons through grounding — now positive, induced by the negative rod without contact.";
          hintText.textContent = "The sphere charged without ever touching the rod. How does that differ from conduction?";
        } else if (sim.ground.connected && sim.induction.near) {
          statusText.textContent = "Rod near and ground connected — electrons flow to or from earth.";
          hintText.textContent = "Remove the ground wire while keeping the rod in place.";
        } else if (sim.ground.connected) {
          statusText.textContent = "Ground is connected. Bring the rod near the other side of the sphere to polarise it.";
          hintText.textContent = "Keep the ground attached, then drag the rod near the left side of the sphere.";
        } else if (sim.induction.near) {
          statusText.textContent = "The rod polarises charges inside the sphere without touching it.";
          hintText.textContent = "Drag the ground symbol to the sphere to connect it.";
        } else {
          statusText.textContent = "Bring the rod near the sphere without touching it, then connect the ground symbol.";
          hintText.textContent = "Step 1: bring rod near.  Step 2: connect ground.  Step 3: remove ground.  Step 4: move rod away.";
        }
      }
    }

    // ── LOOP ───────────────────────────────────────────────────────

    function loop() {
      updatePhysics();
      drawScene();
      requestAnimationFrame(loop);
    }

    tabs.forEach(tab => tab.addEventListener("click", () => setMode(tab.dataset.mode)));
    caseSelect.addEventListener("change", () => { caseIndex = Number(caseSelect.value); resetSimulation(); });
    resetBtn.addEventListener("click", resetSimulation);
    centerBtn.addEventListener("click", centerObjects);
    window.addEventListener("resize", resizeCanvas);

    populateCases();
    resizeCanvas();
    resetSimulation();
    loop();
  </script>
</body>
</html>
