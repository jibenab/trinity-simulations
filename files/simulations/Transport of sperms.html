function Icon({ name, size = 18 }) {

      <svg {...common}>
        <path d="M9 5v14" />
        <path d="M15 5v14" />
      </svg>
    );
  }

      <svg {...common}>
        <path d="M15 18l-6-6 6-6" />

    );
  }

  if (name === 'next') {

    );
  }

    );

        <circle cx="12" cy="12" r="9" />
        <path d="M12 10v6" />
        <path d="M12 7h.01" />

    );
  }

  return (
    <svg {...common}>
      <path d="M8 5l9 7-9 7V5z" fill="currentColor" stroke="none" />
    </svg>
  );
}

              <g fill="none" strokeLinecap="round" strokeLinejoin="round">
                <path
                  d={stage.path}
                  stroke={stage.color}
                  strokeWidth="8"
                  className="pulse-track"
                />

                <path
                  d={stage.path}
                  stroke={spermStroke}
                  strokeWidth="3"
                  className="sperm-flow"
                />

                {activeStage > 0 && (
                  <path d={STAGES[activeStage - 1].path} stroke={STAGES[activeStage - 1].color} strokeWidth="3" opacity="0.28" />
                )}
                {activeStage < STAGES.length - 1 && (
                  <path d={STAGES[activeStage + 1].path} stroke="var(--dark-ink)" strokeWidth="2" opacity="0.14" strokeDasharray="4 4" />
                )}
              </g>
            </svg>

            <div className="stage-readout">
              <span className="readout-dot" style={{ backgroundColor: stage.color }} />
              <span>Stage&nbsp;&nbsp;{activeStage + 1} / 7</span>
              <span>{stage.name}</span>
            </div>
          </div>

          <section className="info-panel" aria-live="polite">
            <div className="info-grid">
              <div>
                <div className="info-heading">
                  <span className="info-icon" style={{ color: stage.color }}>
                    <Icon name="info" size={20} />
                  </span>
                  <h3 className="info-title">{stage.title}</h3>
                </div>
                <p className="info-copy">{stage.description}</p>
              </div>

              <div className="nav-controls">
                <button
                  onClick={handlePrev}
                  disabled={activeStage === 0}
                  className="text-button ghost"
                >
                  <Icon name="previous" size={16} />
                  Previous
                </button>
                <button
                  onClick={handleNext}
                  disabled={activeStage === STAGES.length - 1}
                  className="text-button"
                >
                  Next
                  <Icon name="next" size={16} />
                </button>
              </div>
            </div>
          </section>
        </div>
      </section>
    </main>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
