<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Degrees & Radians - Trinity Simulation Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #EFF2F5;
            --bg-center: #F7F8FA;
            --panel-bg: rgba(247, 248, 250, 0.94);
            --gold: #16839F;
            --gold-muted: rgba(12, 17, 21, 0.16);
            --gold-ghost: rgba(22, 131, 159, 0.08);
            --blue: #0C1115;
            --text-primary: #0C1115;
            --text-label: #4A5560;
            --text-hint: #6B7680;
            --paper: #FFFFFF;
            
            --q1: #16839F;
            --q2: #B7791F;
            --q3: #B94B42;
            --q4: #6B5FB5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Oswald', sans-serif;
            background: radial-gradient(circle at center, var(--bg-center) 0%, var(--bg-color) 100%);
            color: var(--text-primary);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior: none;
            touch-action: manipulation;
        }

        button,
        input {
            font: inherit;
        }

        /* --- Header --- */
        header {
            height: 58px;
            min-height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--blue);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 10;
        }

        .header-brand {
            color: var(--gold);
            font-weight: 600;
            font-size: 1.2rem;
            letter-spacing: 1px;
            width: 260px;
        }

        .header-title {
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            flex-grow: 1;
            text-align: center;
        }

        .header-sub {
            color: var(--text-hint);
            font-size: 0.95rem;
            width: 260px;
            text-align: right;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* --- Main Layout --- */
        main {
            display: flex;
            flex-grow: 1;
            min-height: 0;
            height: calc(100dvh - 58px);
            overflow: hidden;
        }

        /* --- Left Control Panel --- */
        aside {
            width: clamp(292px, 28vw, 340px);
            background: var(--panel-bg);
            border-right: 1px solid var(--gold-muted);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            padding: 18px;
            gap: 18px;
            overflow-y: auto;
            overscroll-behavior: contain;
            flex-shrink: 0;
            z-index: 5;
        }

        .panel-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Angle Control Slider */
        .slider-container {
            width: 100%;
            margin-top: 8px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            outline: none;
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: var(--gold);
            box-shadow: 0 0 12px rgba(22, 131, 159, 0.35);
            cursor: pointer;
            margin-top: -10px;
            border: 2px solid var(--paper);
            transition: transform 0.1s;
        }
        
        input[type=range]:active::-webkit-slider-thumb {
            transform: scale(1.15);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: var(--blue);
            border-radius: 2px;
            box-shadow: 0 0 5px rgba(74, 158, 255, 0.4);
        }
        
        input[type=range]:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        /* Presets */
        .presets-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .preset-row {
            display: flex;
            justify-content: space-between;
        }

        .preset-btn {
            background: var(--gold-ghost);
            border: 1px solid var(--gold-muted);
            color: var(--text-primary);
            border-radius: 4px;
            height: 32px;
            flex: 1;
            margin: 0 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.85rem;
        }

        .preset-btn:hover, .preset-btn:active {
            background: rgba(22, 131, 159, 0.16);
            border-color: var(--gold);
        }

        .frac {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
            font-size: 0.8em;
        }

        .frac .denom {
            border-top: 1px solid currentColor;
            width: 100%;
            text-align: center;
            padding-top: 1px;
            margin-top: 1px;
        }

        /* Readouts */
        .readout-box {
            border: 1px solid var(--gold-muted);
            background: rgba(255, 255, 255, 0.68);
            border-radius: 6px;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .readout-label {
            color: var(--text-label);
            font-size: 0.85rem;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .readout-value {
            font-family: 'IBM Plex Mono', monospace;
            font-variant-numeric: tabular-nums;
            font-size: 1.6rem;
            color: var(--text-primary);
            font-weight: 500;
        }
        
        .readout-value.exact-val {
            font-size: 1.5rem;
        }

        @keyframes flashGold {
            0% { box-shadow: 0 0 0px rgba(22,131,159,0); border-color: var(--gold-muted); }
            30% { box-shadow: 0 0 20px rgba(22,131,159,0.36); border-color: var(--gold); }
            100% { box-shadow: 0 0 0px rgba(22,131,159,0); border-color: var(--gold-muted); }
        }

        .flash {
            animation: flashGold 0.5s ease-out;
        }

        .conversion-strip {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-hint);
            text-align: center;
            margin-top: -8px;
            letter-spacing: 0px;
        }

        /* Toggles */
        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            transition: opacity 0.3s;
        }

        .toggle-label {
            font-size: 1rem;
            color: var(--text-label);
            letter-spacing: 0.5px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider-btn {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: .3s;
            border-radius: 24px;
            border: 1px solid var(--gold-muted);
        }

        .slider-btn:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: var(--text-label);
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider-btn {
            background-color: rgba(22, 131, 159, 0.16);
            border-color: var(--gold);
        }

        input:checked + .slider-btn:before {
            transform: translateX(20px);
            background-color: var(--gold);
            box-shadow: 0 0 8px var(--gold);
        }
        
        input:disabled + .slider-btn {
            cursor: not-allowed;
            opacity: 0.5;
        }

        /* Action Button */
        .action-btn {
            background: rgba(22, 131, 159, 0.12);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 16px;
            border-radius: 6px;
            font-family: 'Oswald', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            font-weight: 500;
            margin-top: auto;
        }

        .action-btn:hover {
            background: var(--gold);
            box-shadow: 0 0 15px rgba(22, 131, 159, 0.24);
            color: var(--paper);
        }

        /* --- Canvas Area --- */
        .canvas-container {
            flex-grow: 1;
            min-width: 0;
            min-height: 0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            touch-action: none;
        }

        /* --- Responsive --- */
        @media (max-height: 620px) and (min-width: 901px) {
            header {
                height: 52px;
                min-height: 52px;
            }
            .header-brand,
            .header-sub {
                width: 220px;
            }
            .header-title {
                font-size: 1.15rem;
            }
            main {
                height: calc(100dvh - 52px);
            }
            aside {
                padding: 14px;
                gap: 10px;
            }
            .panel-section {
                gap: 9px;
            }
            .preset-btn {
                height: 25px;
                font-size: 0.76rem;
            }
            .readout-box {
                padding: 7px 12px;
            }
            .readout-label {
                font-size: 0.72rem;
                margin-bottom: 2px;
            }
            .readout-value {
                font-size: 1.16rem;
            }
            .readout-value.exact-val {
                font-size: 1.12rem;
            }
            .conversion-strip {
                font-size: 0.68rem;
                line-height: 1.25;
                margin-top: -4px;
            }
            .toggle-row {
                padding: 4px 0;
            }
            .toggle-label {
                font-size: 0.86rem;
            }
            .action-btn {
                padding: 10px;
                font-size: 1rem;
            }
        }

        @media (max-width: 900px) {
            header {
                height: auto;
                min-height: 54px;
                padding: 8px 16px;
                gap: 8px;
                flex-wrap: wrap;
            }
            .header-brand, .header-sub {
                width: auto;
                font-size: 0.9rem;
            }
            .header-title {
                order: 3;
                width: 100%;
                font-size: 1.1rem;
                line-height: 1.15;
            }
            main {
                flex-direction: column;
                height: calc(100dvh - 82px);
            }
            aside {
                width: 100%;
                max-height: min(260px, 46dvh);
                padding: 12px 16px;
                border-right: none;
                border-bottom: 1px solid var(--gold-muted);
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 16px;
            }
            .action-btn {
                margin-top: 0;
            }
            .slider-container { margin-top: 0; }
        }
        
        @media (max-width: 600px) {
            header {
                min-height: 60px;
                padding: 6px 12px;
                gap: 4px 10px;
            }
            main {
                height: calc(100dvh - 60px);
            }
            .header-brand,
            .header-sub {
                font-size: 0.76rem;
                line-height: 1;
                letter-spacing: 0.04em;
            }
            .header-title {
                font-size: 1rem;
                line-height: 1.05;
                letter-spacing: 0.01em;
            }
            aside {
                display: grid;
                grid-template-columns: minmax(0, 1fr);
                max-height: min(282px, 42dvh);
                padding: 9px 12px 10px;
                gap: 8px;
                overflow-y: auto;
            }
            .header-sub {
                text-align: left;
            }
            .panel-section {
                gap: 8px;
            }
            .slider-container {
                margin-top: 0;
                padding: 0 2px;
            }
            input[type=range]::-webkit-slider-thumb {
                height: 20px;
                width: 20px;
                margin-top: -8px;
            }
            input[type=range]::-webkit-slider-runnable-track {
                height: 4px;
            }
            .presets-grid {
                gap: 5px;
            }
            .preset-row {
                gap: 5px;
            }
            .preset-btn {
                min-width: 0;
                height: 30px;
                margin: 0;
                border-radius: 5px;
                font-size: 0.72rem;
            }
            aside > .panel-section:nth-of-type(2) {
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 6px;
            }
            .readout-box {
                min-width: 0;
                padding: 7px 8px;
                border-radius: 5px;
            }
            .readout-label {
                overflow: hidden;
                margin-bottom: 3px;
                font-size: 0.58rem;
                letter-spacing: 0.06em;
                line-height: 1.1;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .readout-value {
                overflow: hidden;
                font-size: clamp(0.84rem, 3.6vw, 1rem);
                line-height: 1.15;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .readout-value.exact-val {
                font-size: clamp(0.84rem, 3.6vw, 1rem);
            }
            .conversion-strip {
                grid-column: 1 / -1;
                margin-top: -2px;
                font-size: 0.58rem;
                line-height: 1.2;
            }
            aside > .panel-section:nth-of-type(3) {
                display: grid;
                grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
                gap: 8px;
            }
            .toggle-row {
                min-height: 30px;
                padding: 0;
                gap: 8px;
            }
            .toggle-label {
                min-width: 0;
                overflow: hidden;
                font-size: 0.68rem;
                line-height: 1.1;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .switch {
                width: 38px;
                height: 22px;
                flex: 0 0 auto;
            }
            .slider-btn:before {
                height: 14px;
                width: 14px;
            }
            input:checked + .slider-btn:before {
                transform: translateX(16px);
            }
            .action-btn {
                min-height: 34px;
                padding: 7px 10px;
                border-radius: 5px;
                font-size: 0.84rem;
                line-height: 1;
            }
            .canvas-container {
                flex: 1 1 auto;
                min-height: 0;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-brand">TCL SimLab</div>
        <div class="header-title">Degrees & Radians — Measuring Angles Two Ways</div>
        <div class="header-sub">Class XI Mathematics · Trigonometric Functions</div>
    </header>

    <main>
        <aside>
            <div class="panel-section">
                <div class="slider-container">
                    <input type="range" id="angleSlider" min="0" max="360" step="0.5" value="0" aria-label="Angle in degrees">
                </div>
                <div class="presets-grid" id="presetsGrid">
                    <!-- Injected via JS -->
                </div>
            </div>

            <div class="panel-section">
                <div class="readout-box" id="degBox">
                    <div class="readout-label">DEGREES</div>
                    <div class="readout-value" id="degDisplay">0.0°</div>
                </div>
                <div class="readout-box" id="radDecBox">
                    <div class="readout-label">RADIANS (decimal)</div>
                    <div class="readout-value" id="radDecDisplay">0.0000 rad</div>
                </div>
                <div class="readout-box" id="exactBox">
                    <div class="readout-label">RADIANS (exact)</div>
                    <div class="readout-value exact-val" id="radExactDisplay">0</div>
                </div>
                <div class="conversion-strip" id="conversionStrip">
                    θ_rad = θ_deg × π/180 = 0.0 × π/180 = 0.0000
                </div>
            </div>

            <div class="panel-section">
                <div class="toggle-row">
                    <div class="toggle-label">SHOW ANGLE LABEL</div>
                    <label class="switch">
                        <input type="checkbox" id="toggleRefAngle" checked>
                        <span class="slider-btn"></span>
                    </label>
                </div>
                <div class="toggle-row" id="refAngleUnitWrapper">
                    <div class="toggle-label" style="font-size: 0.85rem; color: var(--text-hint); padding-left: 12px;">↳ USE RADIANS</div>
                    <label class="switch">
                        <input type="checkbox" id="toggleRefUnitRad">
                        <span class="slider-btn"></span>
                    </label>
                </div>
            </div>

            <button class="action-btn" id="btnUnwrap" type="button">⟶ UNWRAP THE ARC</button>
        </aside>

        <section class="canvas-container" id="canvasContainer">
            <canvas id="simCanvas" aria-label="Interactive unit circle showing degrees and radians"></canvas>
        </section>
    </main>

    <script>
        // --- DATA & CONFIG ---
        const exactRadianMap = {
            0: "0", 30: "π/6", 45: "π/4", 60: "π/3", 90: "π/2",
            120: "2π/3", 135: "3π/4", 150: "5π/6", 180: "π",
            210: "7π/6", 225: "5π/4", 240: "4π/3", 270: "3π/2",
            300: "5π/3", 315: "7π/4", 330: "11π/6", 360: "2π",
            390: "13π/6", 405: "9π/4", 420: "7π/3", 450: "5π/2",
            480: "8π/3", 495: "11π/4", 510: "17π/6", 540: "3π",
            570: "19π/6", 585: "13π/4", 600: "10π/3", 630: "7π/2",
            660: "11π/3", 675: "15π/4", 690: "23π/6", 720: "4π"
        };

        const presetsData = [
            [ {v:0, l:"0"}, {v:30, l:"π/6"}, {v:45, l:"π/4"}, {v:60, l:"π/3"}, {v:90, l:"π/2"}, {v:120, l:"2π/3"}, {v:135, l:"3π/4"}, {v:150, l:"5π/6"}, {v:180, l:"π"} ],
            [ {v:210, l:"7π/6"}, {v:225, l:"5π/4"}, {v:240, l:"4π/3"}, {v:270, l:"3π/2"}, {v:300, l:"5π/3"}, {v:315, l:"7π/4"}, {v:330, l:"11π/6"}, {v:360, l:"2π"} ]
        ];

        const quadColors = {
            Q1: {r: 22,  g: 131, b: 159}, // #16839F teal
            Q2: {r: 183, g: 121, b: 31},  // #B7791F amber
            Q3: {r: 185, g: 75,  b: 66},  // #B94B42 red
            Q4: {r: 107, g: 95,  b: 181}  // #6B5FB5 violet
        };

        const theme = getComputedStyle(document.documentElement);
        function colorVar(name, fallback) {
            return theme.getPropertyValue(name).trim() || fallback;
        }

        const canvasColors = {
            accent: colorVar('--gold', '#16839F'),
            ink: colorVar('--text-primary', '#0C1115'),
            mute: colorVar('--text-hint', '#6B7680'),
            axis: 'rgba(12, 17, 21, 0.18)',
            quadrant: 'rgba(12, 17, 21, 0.09)'
        };

        // --- STATE ---
        let state = {
            angleDeg: 0,
            targetAngleDeg: 0,
            isDragging: false,
            showRefAngle: true,
            refAngleRad: false, // New state for degrees/radians mode
            unwrapProgress: 0, // 0 to 1
            isUnwrapped: false,
            currentColor: { ...quadColors.Q1 },
            lastSnap: 0,
            baseR: 240,
            currentR: 240
        };

        // --- DOM ELEMENTS ---
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvasContainer');
        const slider = document.getElementById('angleSlider');
        const degDisplay = document.getElementById('degDisplay');
        const radDecDisplay = document.getElementById('radDecDisplay');
        const radExactDisplay = document.getElementById('radExactDisplay');
        const conversionStrip = document.getElementById('conversionStrip');
        const exactBox = document.getElementById('exactBox');
        const btnUnwrap = document.getElementById('btnUnwrap');
        const toggleRefAngle = document.getElementById('toggleRefAngle');
        const toggleRefUnitRad = document.getElementById('toggleRefUnitRad');
        const refAngleUnitWrapper = document.getElementById('refAngleUnitWrapper');

        // --- INITIALIZATION ---
        function initPresets() {
            const grid = document.getElementById('presetsGrid');
            presetsData.forEach(row => {
                const rowEl = document.createElement('div');
                rowEl.className = 'preset-row';
                row.forEach(preset => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'preset-btn';
                    btn.setAttribute('aria-label', `Set angle to ${preset.v} degrees`);
                    if (preset.l === "0" || preset.l === "π" || preset.l === "2π") {
                        btn.innerHTML = preset.l;
                    } else {
                        let parts = preset.l.split('/');
                        btn.innerHTML = `<div class="frac"><span>${parts[0]}</span><span class="denom">${parts[1]}</span></div>`;
                    }
                    btn.addEventListener('click', () => {
                        if (state.isUnwrapped) return;
                        animateToAngle(preset.v);
                    });
                    rowEl.appendChild(btn);
                });
                grid.appendChild(rowEl);
            });
        }

        function resize() {
            const rect = container.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            
            // Leave room for the unwrapped ruler in the app's short iframe.
            const availableR = Math.min((rect.width - 72) / 2, (rect.height - 160) / 2);
            state.baseR = Math.max(44, Math.min(260, availableR));
            if (!Number.isFinite(state.currentR) || state.currentR <= 0 || Math.abs(state.currentR - state.baseR) > 80) {
                state.currentR = state.baseR;
            }
        }

        // --- LOGIC ---
        function getQuadColor(deg) {
            let d = deg % 360;
            if (d < 90) return quadColors.Q1;
            if (d < 180) return quadColors.Q2;
            if (d < 270) return quadColors.Q3;
            return quadColors.Q4;
        }

        function pointOnAngle(cx, cy, radius, deg) {
            const rad = deg * Math.PI / 180;
            return {
                x: cx + radius * Math.cos(rad),
                y: cy - radius * Math.sin(rad)
            };
        }

        function renderFractionHTML(label) {
            if (!label || label === "0" || label.indexOf('/') === -1) return label || "—";
            let parts = label.split('/');
            return `<div class="frac" style="display:inline-flex; align-items:center;"><span>${parts[0]}</span><span class="denom" style="margin-top:2px;">${parts[1]}</span></div>`;
        }

        function updateReadouts(val) {
            degDisplay.textContent = val.toFixed(1) + '°';
            
            let radDec = (val * Math.PI / 180).toFixed(4);
            radDecDisplay.textContent = radDec + ' rad';

            let isSnap = false;
            let exactStr = exactRadianMap[val];
            if (exactStr !== undefined && (Math.abs(val - Math.round(val)) < 0.1)) {
                isSnap = true;
                radExactDisplay.innerHTML = renderFractionHTML(exactStr);
                radExactDisplay.style.color = 'var(--text-primary)';
            } else {
                radExactDisplay.innerHTML = '—';
                radExactDisplay.style.color = 'var(--text-hint)';
            }

            conversionStrip.textContent = `θ_rad = θ_deg × π/180 = ${val.toFixed(1)} × π/180 = ${radDec}`;
            return isSnap;
        }

        function triggerSnapFlash() {
            exactBox.classList.remove('flash');
            void exactBox.offsetWidth; // force reflow
            exactBox.classList.add('flash');
        }

        function handleSliderInput(e) {
            let val = parseFloat(e.target.value);
            
            // Snap logic
            let bestSnap = Object.keys(exactRadianMap).map(Number).reduce((prev, curr) => {
                return (Math.abs(curr - val) < Math.abs(prev - val) ? curr : prev);
            });

            if (Math.abs(val - bestSnap) <= 1.5) {
                val = bestSnap;
                slider.value = val;
                if (state.lastSnap !== bestSnap) {
                    triggerSnapFlash();
                    state.lastSnap = bestSnap;
                }
            } else {
                state.lastSnap = -1;
            }

            state.targetAngleDeg = val;
            state.angleDeg = val; // direct update during drag
            updateReadouts(val);
        }

        // Animation for presets
        function animateToAngle(newAngle) {
            if (state.isUnwrapped) return;
            let start = state.targetAngleDeg;
            let startTime = performance.now();
            function step(time) {
                let t = (time - startTime) / 400;
                if (t > 1) t = 1;
                let ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                state.targetAngleDeg = start + (newAngle - start) * ease;
                
                // Keep visually synced
                slider.value = state.targetAngleDeg;
                updateReadouts(state.targetAngleDeg);
                
                if (t < 1) requestAnimationFrame(step);
                else {
                    state.targetAngleDeg = newAngle;
                    state.angleDeg = newAngle;
                    triggerSnapFlash();
                    state.lastSnap = newAngle;
                }
            }
            requestAnimationFrame(step);
        }

        // --- DRAWING LOOP ---
        function draw() {
            const rect = container.getBoundingClientRect();
            const cx = rect.width / 2;
            const cy = rect.height / 2 - (state.unwrapProgress * 20); // slightly lift center when unwrapped
            
            ctx.clearRect(0, 0, rect.width, rect.height);

            // 1. Lerp values
            if (!state.isDragging && Math.abs(state.targetAngleDeg - state.angleDeg) > 0.05) {
                state.angleDeg += (state.targetAngleDeg - state.angleDeg) * 0.2;
            } else if (!state.isDragging) {
                state.angleDeg = state.targetAngleDeg;
            }

            let targetCol = getQuadColor(state.targetAngleDeg);
            state.currentColor.r += (targetCol.r - state.currentColor.r) * 0.15;
            state.currentColor.g += (targetCol.g - state.currentColor.g) * 0.15;
            state.currentColor.b += (targetCol.b - state.currentColor.b) * 0.15;

            // Compute dynamic radius to fit unwrapped line
            let targetR = state.baseR;
            let currentAngleRad = state.angleDeg * Math.PI / 180;
            if (state.unwrapProgress > 0) {
                let maxW = rect.width - 80;
                let neededW = currentAngleRad * state.baseR;
                if (neededW > maxW && currentAngleRad > 0) {
                    targetR = maxW / currentAngleRad;
                }
            }
            state.currentR += (targetR - state.currentR) * 0.1;

            const rgbStr = `${Math.round(state.currentColor.r)}, ${Math.round(state.currentColor.g)}, ${Math.round(state.currentColor.b)}`;

            // 2. Base Grid & Axes
            ctx.lineWidth = 1;
            ctx.strokeStyle = canvasColors.axis;
            ctx.beginPath();
            ctx.moveTo(0, cy); ctx.lineTo(rect.width, cy); // X
            ctx.moveTo(cx, 0); ctx.lineTo(cx, rect.height); // Y
            ctx.stroke();

            // Ticks & Labels
            ctx.fillStyle = canvasColors.mute;
            ctx.font = "12px 'IBM Plex Mono'";
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            [-1, -0.5, 0.5, 1].forEach(val => {
                let px = cx + val * state.currentR;
                ctx.beginPath(); ctx.moveTo(px, cy - 5); ctx.lineTo(px, cy + 5); ctx.stroke();
                if(val !== 0) ctx.fillText(val.toFixed(1), px, cy + 20);
                
                let py = cy - val * state.currentR;
                ctx.beginPath(); ctx.moveTo(cx - 5, py); ctx.lineTo(cx + 5, py); ctx.stroke();
                if(val !== 0) ctx.fillText(val.toFixed(1), cx - 25, py);
            });

            // Quadrant text
            ctx.fillStyle = canvasColors.quadrant;
            ctx.font = "bold 40px 'Oswald'";
            ctx.fillText("I", cx + state.currentR*0.6, cy - state.currentR*0.6);
            ctx.fillText("II", cx - state.currentR*0.6, cy - state.currentR*0.6);
            ctx.fillText("III", cx - state.currentR*0.6, cy + state.currentR*0.6);
            ctx.fillText("IV", cx + state.currentR*0.6, cy + state.currentR*0.6);

            // Unit Circle outline
            ctx.beginPath();
            ctx.arc(cx, cy, state.currentR, 0, Math.PI * 2);
            ctx.strokeStyle = canvasColors.accent;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Faint actual-angle wedge fill, always measured from 0 degrees.
            if (state.angleDeg > 0 && state.unwrapProgress < 1) {
                ctx.save();
                const fillAngle = Math.min(Math.max(state.angleDeg, 0), 360);
                const fillSteps = Math.max(2, Math.ceil(fillAngle / 4));
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                for (let i = 0; i <= fillSteps; i++) {
                    const point = pointOnAngle(cx, cy, state.currentR, fillAngle * (i / fillSteps));
                    ctx.lineTo(point.x, point.y);
                }
                ctx.lineTo(cx, cy);
                ctx.fillStyle = `rgba(${rgbStr}, ${0.08 * (1 - state.unwrapProgress)})`;
                ctx.fill();
                ctx.restore();
            }

            // 3. The sweeping arc (Morphs to line)
            let steps = state.angleDeg > 0.001 ? Math.max(20, Math.floor(state.angleDeg * 1.5)) : 0;
            
            let L = currentAngleRad * state.currentR;
            let startX = cx - L/2;
            let yLine = cy + state.currentR + 80;

            let points = [];
            if (steps > 0) {
                for (let i = 0; i <= steps; i++) {
                    let aDeg = (i / steps) * state.angleDeg;
                    let aRad = aDeg * Math.PI / 180;

                    // Circle position
                    let curROffset = aDeg <= 360 ? 0.96 : 1.04;
                    let effR = state.currentR * (curROffset * (1 - state.unwrapProgress) + 1.0 * state.unwrapProgress);
                    let xc = cx + effR * Math.cos(aRad);
                    let yc = cy - effR * Math.sin(aRad);

                    // Line position
                    let xl = startX + aRad * state.currentR;
                    let yl = yLine;

                    // Interpolate
                    let x = xc * (1 - state.unwrapProgress) + xl * state.unwrapProgress;
                    let y = yc * (1 - state.unwrapProgress) + yl * state.unwrapProgress;
                    points.push({x, y});
                }
            }

            if (points.length > 0) {
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                for (let i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i].x, points[i].y);
                }
                ctx.strokeStyle = `rgb(${rgbStr})`;
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();

                // Point P
                let P = points[points.length - 1];
                ctx.beginPath();
                ctx.arc(P.x, P.y, 8, 0, Math.PI * 2);
                ctx.fillStyle = `rgb(${rgbStr})`;
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = canvasColors.accent;
                ctx.stroke();

                // Radius Arm (fades out on unwrap)
                if (state.unwrapProgress < 1) {
                    ctx.save();
                    ctx.globalAlpha = 1 - state.unwrapProgress;
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    let endROffset = state.angleDeg <= 360 ? 0.96 : 1.04;
                    let pxCirc = cx + state.currentR * endROffset * Math.cos(currentAngleRad);
                    let pyCirc = cy - state.currentR * endROffset * Math.sin(currentAngleRad);
                    ctx.lineTo(pxCirc, pyCirc);
                    ctx.strokeStyle = `rgb(${rgbStr})`;
                    ctx.lineWidth = 4;
                    ctx.shadowColor = ctx.strokeStyle;
                    ctx.shadowBlur = 10;
                    ctx.stroke();
                    ctx.restore();
                }
            }

            // 4. Angle Label & Drop Line
            if (state.showRefAngle && state.unwrapProgress < 1 && state.angleDeg > 0.001) {
                let actualArcDeg = Math.min(Math.max(state.angleDeg, 0), 360);
                let refRadLen = state.currentR * 0.25;

                ctx.save();
                ctx.globalAlpha = 1 - state.unwrapProgress;
                
                // Drop line
                let px = cx + state.currentR * Math.cos(currentAngleRad);
                let py = cy - state.currentR * Math.sin(currentAngleRad);
                ctx.strokeStyle = canvasColors.accent;
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 4]);
                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.lineTo(px, cy);
                ctx.stroke();

                // Arc
                ctx.setLineDash([]);
                ctx.beginPath();
                let refSteps = Math.max(18, Math.ceil(actualArcDeg / 5));
                for(let i=0; i<=refSteps; i++) {
                    let d = actualArcDeg * (i/refSteps);
                    let point = pointOnAngle(cx, cy, refRadLen, d);
                    if (i===0) ctx.moveTo(point.x, point.y);
                    else ctx.lineTo(point.x, point.y);
                }
                ctx.stroke();

                // Generate text label matching the main angle (degree column)
                let labelStr = "";
                let displayDeg = state.angleDeg;

                if (state.refAngleRad) {
                    let exact = null;
                    for(let k in exactRadianMap) {
                        if (Math.abs(displayDeg - parseFloat(k)) < 0.1) {
                            exact = exactRadianMap[k];
                            break;
                        }
                    }
                    labelStr = exact ? exact : (displayDeg * Math.PI / 180).toFixed(2);
                } else {
                    labelStr = (Math.abs(displayDeg - Math.round(displayDeg)) < 0.1) ? Math.round(displayDeg) + "°" : displayDeg.toFixed(1) + "°";
                }

                // Label Position
                let midArc = actualArcDeg / 2;
                let midRad = midArc * Math.PI / 180;
                let textOffset = 22 + (labelStr.length > 3 ? 6 : 0); // Push further if text is long (e.g. decimal)
                
                let tx = cx + (refRadLen + textOffset) * Math.cos(midRad);
                let ty = cy - (refRadLen + textOffset) * Math.sin(midRad);
                
                ctx.fillStyle = canvasColors.accent;
                ctx.font = "14px 'IBM Plex Mono'";
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(labelStr, tx, ty);
                ctx.restore();
            }

            // 5. Unwrapped Ruler
            if (state.unwrapProgress > 0) {
                ctx.save();
                ctx.globalAlpha = state.unwrapProgress;
                let rulerY = yLine - 25;
                
                // Base line
                ctx.strokeStyle = canvasColors.mute;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(startX, rulerY);
                ctx.lineTo(startX + L, rulerY);
                ctx.stroke();

                // Integer radius marks
                ctx.fillStyle = canvasColors.mute;
                ctx.font = "12px 'IBM Plex Mono'";
                let maxR = Math.floor(currentAngleRad);
                for(let i=0; i<=maxR; i++) {
                    let tx = startX + i * state.currentR;
                    ctx.beginPath(); ctx.moveTo(tx, rulerY - 5); ctx.lineTo(tx, rulerY + 5); ctx.stroke();
                    ctx.fillText(i + "r", tx, rulerY - 14);
                }

                // Pi marks
                let piMarks = [];
                for (let m = 1; m <= 4; m++) {
                    if (currentAngleRad >= m * Math.PI) piMarks.push({ val: m * Math.PI, label: m===1 ? 'π' : m+'π' });
                }

                ctx.fillStyle = canvasColors.accent;
                ctx.strokeStyle = canvasColors.accent;
                ctx.font = "14px 'IBM Plex Mono'";
                for(let mark of piMarks) {
                    let tx = startX + mark.val * state.currentR;
                    ctx.beginPath(); ctx.moveTo(tx, rulerY - 8); ctx.lineTo(tx, rulerY + 8); ctx.stroke();
                    ctx.fillText(mark.label, tx, rulerY - 18);
                }

                ctx.restore();
            }

            requestAnimationFrame(draw);
        }

        // --- EVENT LISTENERS ---
        window.addEventListener('resize', resize);

        slider.addEventListener('input', handleSliderInput);
        slider.addEventListener('mousedown', () => state.isDragging = true);
        slider.addEventListener('touchstart', () => state.isDragging = true, {passive:true});
        window.addEventListener('mouseup', () => state.isDragging = false);
        window.addEventListener('touchend', () => state.isDragging = false);

        toggleRefAngle.addEventListener('change', (e) => {
            state.showRefAngle = e.target.checked;
            
            // Dim and disable the inner toggle if reference angle is off
            refAngleUnitWrapper.style.opacity = state.showRefAngle ? '1' : '0.4';
            toggleRefUnitRad.disabled = !state.showRefAngle;
        });

        toggleRefUnitRad.addEventListener('change', (e) => {
            state.refAngleRad = e.target.checked;
        });

        btnUnwrap.addEventListener('click', () => {
            if (state.isAnimatingUnwrap) return;
            state.isUnwrapped = !state.isUnwrapped;
            btnUnwrap.textContent = state.isUnwrapped ? "⟲ WRAP BACK" : "⟶ UNWRAP THE ARC";
            slider.disabled = true; // disable immediately
            
            let start = state.unwrapProgress;
            let target = state.isUnwrapped ? 1 : 0;
            let startTime = performance.now();
            state.isAnimatingUnwrap = true;

            function step(time) {
                let t = (time - startTime) / 1200;
                if (t > 1) t = 1;
                let ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; // ease-in-out
                state.unwrapProgress = start + (target - start) * ease;
                
                if (t < 1) requestAnimationFrame(step);
                else {
                    state.unwrapProgress = target;
                    state.isAnimatingUnwrap = false;
                    if (!state.isUnwrapped) slider.disabled = false; // re-enable when wrapped
                }
            }
            requestAnimationFrame(step);
        });

        canvas.addEventListener('pointerdown', (e) => {
            if (state.isUnwrapped || state.isAnimatingUnwrap) return;
            const rect = canvas.getBoundingClientRect();
            const cx = rect.width / 2;
            const cy = rect.height / 2;
            
            let dx = e.clientX - rect.left - cx;
            let dy = cy - (e.clientY - rect.top); // canvas Y is down
            
            let aRad = Math.atan2(dy, dx);
            if (aRad < 0) aRad += 2 * Math.PI;
            let aDeg = aRad * 180 / Math.PI;

            // Tap snap
            let bestSnap = Object.keys(exactRadianMap).map(Number).reduce((prev, curr) => {
                return (Math.abs(curr - aDeg) < Math.abs(prev - aDeg) ? curr : prev);
            });
            if (Math.abs(aDeg - bestSnap) <= 5) {
                aDeg = bestSnap;
                if(state.lastSnap !== bestSnap) triggerSnapFlash();
                state.lastSnap = bestSnap;
            }

            state.targetAngleDeg = aDeg;
            slider.value = aDeg;
            updateReadouts(aDeg);
        });

        document.addEventListener('keydown', (e) => {
            if (state.isUnwrapped || state.isAnimatingUnwrap) return;
            if (!['ArrowRight', 'ArrowUp', 'ArrowLeft', 'ArrowDown'].includes(e.key)) return;
            e.preventDefault();
            let step = e.shiftKey ? 15 : 1;
            let newVal = state.targetAngleDeg;
            
            if (e.key === 'ArrowRight' || e.key === 'ArrowUp') newVal += step;
            if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') newVal -= step;
            
            if (newVal !== state.targetAngleDeg) {
                let maxVal = 360;
                newVal = Math.max(0, Math.min(maxVal, newVal));
                
                // Snap on keyboard too
                let bestSnap = Object.keys(exactRadianMap).map(Number).reduce((prev, curr) => {
                    return (Math.abs(curr - newVal) < Math.abs(prev - newVal) ? curr : prev);
                });
                if (Math.abs(newVal - bestSnap) <= 0.1) {
                    newVal = bestSnap;
                    if(state.lastSnap !== bestSnap) triggerSnapFlash();
                    state.lastSnap = bestSnap;
                }

                state.targetAngleDeg = newVal;
                slider.value = newVal;
                updateReadouts(newVal);
            }
        });

        window.__TRINITY_INIT__ = window.__TRINITY_INIT__ || {
            userName: "Student",
            slug: "radians-degree",
            contentType: "simulation"
        };
        window.addEventListener("message", (event) => {
            if (event.data && event.data.type === "init") {
                window.__TRINITY_INIT__ = event.data;
            }
        });
        if (window.parent && window.parent !== window) {
            parent.postMessage({ type: "ready" }, "*");
        }

        // BOOT
        initPresets();
        resize();
        updateReadouts(0);
        requestAnimationFrame(draw);

    </script>
</body>
</html>
