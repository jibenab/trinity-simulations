<svg viewBox="0 0 200 140" width="100%" style="max-height:120px" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">

  <style>
    @media (prefers-reduced-motion: reduce) {
      .live * { animation: none; }
    }
  </style>

  <!-- Background grid -->
  <line x1="20"  y1="12" x2="20"  y2="128" stroke="var(--ink)" stroke-width="0.5" opacity="0.15"/>
  <line x1="60"  y1="12" x2="60"  y2="128" stroke="var(--ink)" stroke-width="0.5" opacity="0.15"/>
  <line x1="100" y1="12" x2="100" y2="128" stroke="var(--ink)" stroke-width="0.5" opacity="0.15"/>
  <line x1="140" y1="12" x2="140" y2="128" stroke="var(--ink)" stroke-width="0.5" opacity="0.15"/>
  <line x1="180" y1="12" x2="180" y2="128" stroke="var(--ink)" stroke-width="0.5" opacity="0.15"/>
  <line x1="12" y1="12"  x2="188" y2="12"  stroke="var(--ink)" stroke-width="0.5" opacity="0.15"/>
  <line x1="12" y1="41"  x2="188" y2="41"  stroke="var(--ink)" stroke-width="0.5" opacity="0.15"/>
  <line x1="12" y1="70"  x2="188" y2="70"  stroke="var(--ink)" stroke-width="0.5" opacity="0.15"/>
  <line x1="12" y1="99"  x2="188" y2="99"  stroke="var(--ink)" stroke-width="0.5" opacity="0.15"/>
  <line x1="12" y1="128" x2="188" y2="128" stroke="var(--ink)" stroke-width="0.5" opacity="0.15"/>

  <!-- Road axis -->
  <line x1="24" y1="80" x2="176" y2="80" stroke="var(--ink)" stroke-width="1.2"/>

  <!-- Town A and Town B tick marks -->
  <line x1="30" y1="74" x2="30" y2="86" stroke="var(--ink)" stroke-width="1"/>
  <line x1="170" y1="74" x2="170" y2="86" stroke="var(--ink)" stroke-width="1"/>
  <text x="26" y="95" font-family="var(--mono)" font-size="8.5" fill="var(--ink-mute)" letter-spacing="0.04em">A</text>
  <text x="166" y="95" font-family="var(--mono)" font-size="8.5" fill="var(--ink-mute)" letter-spacing="0.04em">B</text>

  <!-- Distance row (above road, y=58–68): full A→B→A path -->
  <!-- Out leg: solid -->
  <line x1="30" y1="60" x2="170" y2="60" stroke="var(--ink)" stroke-width="1.5" opacity="0.65"/>
  <!-- Return leg: dashed, offset -->
  <line x1="170" y1="67" x2="30" y2="67" stroke="var(--ink)" stroke-width="1" stroke-dasharray="5 4" opacity="0.35"/>
  <!-- Row label -->
  <text x="16" y="64" font-family="var(--mono)" font-size="8.5" fill="var(--ink-mute)" letter-spacing="0.06em">d</text>

  <!-- Displacement row (below road, y=100): net vector from origin -->
  <!-- Animates from 0 → full → 0 as car travels A → B → A -->
  <line x1="30" y1="100" x2="30" y2="100" stroke="var(--accent)" stroke-width="1.5">
    <animate attributeName="x2"
      values="30;170;30;30"
      dur="5s"
      repeatCount="indefinite"
      calcMode="spline"
      keyTimes="0;0.47;0.96;1"
      keySplines="0.45 0 0.55 1; 0.45 0 0.55 1; 0 0 1 1"/>
  </line>
  <!-- Origin anchor dot (always visible) -->
  <circle cx="30" cy="100" r="2.5" fill="var(--accent)" opacity="0.45"/>
  <!-- Row label -->
  <text x="16" y="104" font-family="var(--mono)" font-size="8.5" fill="var(--ink-mute)" letter-spacing="0.06em">s</text>

  <!-- Hidden motion path for car -->
  <path id="sv-road" d="M30,80 L170,80 L30,80" fill="none" stroke="none"/>

  <!-- Live element: car (accent dot) moving A → B → A -->
  <g class="live">
    <circle r="5.5" fill="var(--accent)">
      <animateMotion dur="5s" repeatCount="indefinite"
        calcMode="spline"
        keyTimes="0;0.47;0.96;1"
        keySplines="0.45 0 0.55 1; 0.45 0 0.55 1; 0 0 1 1">
        <mpath href="#sv-road"/>
      </animateMotion>
    </circle>
  </g>

</svg>
