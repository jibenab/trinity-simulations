<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atomic Size Trends — Trinity Simulation Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_shared/projector-mode.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #EFF2F5;
      --bg-alt: #E2E7EC;
      --paper: #F7F8FA;
      --ink: #0C1115;
      --ink-soft: #2B333A;
      --ink-mute: #6B7680;
      --rule-soft: rgba(12, 17, 21, 0.14);
      --dark: #0C1115;
      --dark-ink: #EFF2F5;
      --dark-mute: #7F8892;
      --accent: oklch(0.52 0.12 200);
      --accent-ink: #F7F8FA;
      --sans: "Manrope", system-ui, sans-serif;
      --mono: "JetBrains Mono", ui-monospace, monospace;
      --stage-rule: rgba(239, 242, 245, 0.04);
      --stage-grid: rgba(127, 136, 146, 0.26);
      --stage-fill-muted: rgba(239, 242, 245, 0.12);
      --stage-fill-soft: rgba(239, 242, 245, 0.08);
      --stage-ghost: rgba(239, 242, 245, 0.5);
      --stage-chip: rgba(12, 17, 21, 0.9);
      --stage-axis: rgba(239, 242, 245, 0.18);
      --stage-dash: rgba(239, 242, 245, 0.36);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body,
    #root {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      font-feature-settings: "ss01", "cv11";
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 10px 22px;
      border-bottom: 1px solid var(--rule-soft);
    }

    .eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-mute);
    }

    .title {
      margin-top: 6px;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--ink);
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn-circle {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--rule-soft);
      background: transparent;
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.15s ease, border-color 0.15s ease, opacity 0.15s ease;
    }

    .btn-circle:hover {
      background: var(--bg-alt);
      border-color: var(--ink-mute);
    }

    .btn-circle:active {
      opacity: 0.65;
    }

    .btn-circle svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .btn-circle.outline svg {
      fill: none;
      stroke: currentColor;
      stroke-width: 2.1;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .body {
      flex: 1;
      display: flex;
      flex-direction: row;
      min-height: 400px;
    }

    .stage {
      flex: 1;
      background: var(--dark);
      border-right: 1px solid var(--stage-rule);
      position: relative;
      display: flex;
      min-height: 0;
    }

    .stage-left,
    .stage-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      min-height: 0;
      padding: 14px;
    }

    .stage-right {
      border-left: 1px solid var(--stage-rule);
    }

    .stage-panel {
      width: 100%;
      height: 100%;
      min-height: 372px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stage-panel svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    .params {
      flex-shrink: 0;
      padding: 18px 20px;
      border-top: 1px solid var(--rule-soft);
      background: var(--bg);
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .view-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 220px;
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .view-btn {
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--rule-soft);
      background: transparent;
      color: var(--ink);
      font-size: 14px;
      font-weight: 500;
      transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }

    .view-btn:hover {
      border-color: var(--ink-mute);
      background: var(--paper);
    }

    .view-btn.active {
      background: var(--ink);
      color: var(--bg);
      border-color: var(--ink);
    }

    .slider-group {
      flex: 1 1 260px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 240px;
    }

    .label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .label-mono {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-mute);
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .btn {
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid var(--ink);
      background: var(--ink);
      color: var(--bg);
      font-weight: 500;
      letter-spacing: -0.01em;
      transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease, opacity 0.15s ease;
    }

    .btn.ghost {
      background: transparent;
      color: var(--ink);
    }

    .btn:hover:not(:disabled) {
      background: var(--ink-soft);
      border-color: var(--ink-soft);
    }

    .btn.ghost:hover:not(:disabled) {
      background: var(--paper);
      border-color: var(--ink-soft);
      color: var(--ink);
    }

    button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }

    .prompt {
      padding: 10px 22px;
      border-top: 1px solid var(--rule-soft);
      background: var(--bg);
      font-size: 13px;
      color: var(--ink-soft);
      font-style: italic;
      min-height: 36px;
      display: flex;
      align-items: center;
    }

    .bar-rect,
    .bar-ghost {
      transition: all 0.3s ease;
    }


    @media (max-width: 700px) {
      html,
      body,
      #root {
        height: auto;
      }

      .body {
        flex-direction: column;
      }

      .stage {
        flex-direction: column;
        min-height: 480px;
        border-right: none;
      }

      .stage-left {
        order: 2;
      }

      .stage-right {
        order: 1;
        border-left: none;
        border-top: none;
        border-bottom: 1px solid var(--stage-rule);
      }

      .stage-panel {
        min-height: 280px;
      }

      .params {
        align-items: stretch;
      }

      .view-btns,
      .slider-group {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const ELEMENTS = {
      1:  { sym: "H",  z: 1,  shells: 1, r: 31,  name: "Hydrogen",   config: [1] },
      2:  { sym: "He", z: 2,  shells: 1, r: 28,  name: "Helium",     config: [2] },
      3:  { sym: "Li", z: 3,  shells: 2, r: 128, name: "Lithium",    config: [2, 1] },
      4:  { sym: "Be", z: 4,  shells: 2, r: 96,  name: "Beryllium",  config: [2, 2] },
      5:  { sym: "B",  z: 5,  shells: 2, r: 84,  name: "Boron",      config: [2, 3] },
      6:  { sym: "C",  z: 6,  shells: 2, r: 76,  name: "Carbon",     config: [2, 4] },
      7:  { sym: "N",  z: 7,  shells: 2, r: 71,  name: "Nitrogen",   config: [2, 5] },
      8:  { sym: "O",  z: 8,  shells: 2, r: 66,  name: "Oxygen",     config: [2, 6] },
      9:  { sym: "F",  z: 9,  shells: 2, r: 57,  name: "Fluorine",   config: [2, 7] },
      10: { sym: "Ne", z: 10, shells: 2, r: 58,  name: "Neon",       config: [2, 8] },
      11: { sym: "Na", z: 11, shells: 3, r: 166, name: "Sodium",     config: [2, 8, 1] },
      12: { sym: "Mg", z: 12, shells: 3, r: 141, name: "Magnesium",  config: [2, 8, 2] },
      13: { sym: "Al", z: 13, shells: 3, r: 121, name: "Aluminum",   config: [2, 8, 3] },
      14: { sym: "Si", z: 14, shells: 3, r: 111, name: "Silicon",    config: [2, 8, 4] },
      15: { sym: "P",  z: 15, shells: 3, r: 107, name: "Phosphorus", config: [2, 8, 5] },
      16: { sym: "S",  z: 16, shells: 3, r: 105, name: "Sulfur",     config: [2, 8, 6] },
      17: { sym: "Cl", z: 17, shells: 3, r: 102, name: "Chlorine",   config: [2, 8, 7] },
      18: { sym: "Ar", z: 18, shells: 3, r: 106, name: "Argon",      config: [2, 8, 8] },
      19: { sym: "K",  z: 19, shells: 4, r: 203, name: "Potassium",  config: [2, 8, 8, 1] },
      20: { sym: "Ca", z: 20, shells: 4, r: 176, name: "Calcium",    config: [2, 8, 8, 2] },
    };

    const VIEWS = [
      { id: "p2", label: "Period 2", sequence: [3, 4, 5, 6, 7, 8, 9, 10] },
      { id: "p3", label: "Period 3", sequence: [11, 12, 13, 14, 15, 16, 17, 18] },
      { id: "g1", label: "Group 1", sequence: [1, 3, 11, 19] },
    ];

    const PROMPTS = {
      p2: "Z increases by 1 each step — same shell, stronger pull. Why does the atom shrink?",
      p3: "Period 3 mirrors Period 2 — same pull mechanism, different shell. Do the numbers confirm it?",
      g1: "Each new period adds a whole shell. Does the size jump match the shell jump?",
    };

    const baseShellRadii = [45, 85, 125, 165];
    const outerShellRanges = {
      1: [32, 45],
      2: [92, 128],
      3: [128, 165],
      4: [150, 180],
    };
    const INITIAL_VIEW = "p2";
    const LEFT_GRID = 8;
    const RIGHT_GRID = 8;

    function getCenteredGridPath(size, divisions) {
      const start = -size / 2;
      const end = size / 2;
      const step = size / divisions;
      let path = "";
      for (let i = 0; i <= divisions; i += 1) {
        const p = start + step * i;
        path += `M ${p} ${start} L ${p} ${end} `;
        path += `M ${start} ${p} L ${end} ${p} `;
      }
      return path.trim();
    }

    function getRectGridPath(width, height, divisions) {
      const xStep = width / divisions;
      const yStep = height / divisions;
      let path = "";
      for (let i = 0; i <= divisions; i += 1) {
        const x = xStep * i;
        path += `M ${x} 0 L ${x} ${height} `;
      }
      for (let i = 0; i <= divisions; i += 1) {
        const y = yStep * i;
        path += `M 0 ${y} L ${width} ${y} `;
      }
      return path.trim();
    }

    function getNucleusDots(z) {
      const dots = [];
      const c = 3.5;
      const goldenAngle = 137.508 * (Math.PI / 180);

      if (z <= 20) {
        for (let i = 0; i < z; i += 1) {
          const r = c * Math.sqrt(i);
          const theta = i * goldenAngle;
          dots.push({
            id: `spiral-${i}`,
            x: r * Math.cos(theta),
            y: r * Math.sin(theta),
          });
        }
        return dots;
      }

      for (let i = 0; i < 16; i += 1) {
        const r = c * Math.sqrt(i);
        const theta = i * goldenAngle;
        dots.push({
          id: `spiral-${i}`,
          x: r * Math.cos(theta),
          y: r * Math.sin(theta),
        });
      }

      const clustered = Math.min(z - 16, 4);
      for (let i = 0; i < clustered; i += 1) {
        const theta = i * (Math.PI / 2);
        dots.push({
          id: `cluster-${i}`,
          x: 6 * Math.cos(theta),
          y: 6 * Math.sin(theta),
        });
      }

      return dots;
    }

    function getShellRadiiForElement(element, sequence) {
      const radiiInSequence = sequence.map((z) => ELEMENTS[z].r);
      const minRadius = Math.min(...radiiInSequence);
      const maxRadius = Math.max(...radiiInSequence);
      const normalized = maxRadius === minRadius
        ? 0.5
        : (element.r - minRadius) / (maxRadius - minRadius);
      const [outerMin, outerMax] = outerShellRanges[element.shells];
      const outerRadius = outerMin + normalized * (outerMax - outerMin);

      if (element.shells === 1) {
        return [outerRadius];
      }

      return [
        ...baseShellRadii.slice(0, element.shells - 1),
        outerRadius,
      ];
    }

    function getValenceElectrons(element, shellRadii) {
      const valenceCount = element.config[element.config.length - 1];
      const radius = shellRadii[element.shells - 1];
      const startAngle = -Math.PI / 4;

      return Array.from({ length: valenceCount }, (_, index) => {
        const angle = startAngle + (index * Math.PI * 2) / valenceCount;
        return {
          id: `valence-${index}`,
          x: radius * Math.cos(angle),
          y: radius * Math.sin(angle),
        };
      });
    }

    function roundChartMax(value) {
      return Math.ceil(value / 20) * 20;
    }

    function App() {
      const [activeView, setActiveView] = useState(INITIAL_VIEW);
      const [stepIndex, setStepIndex] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isFullscreen, setIsFullscreen] = useState(Boolean(document.fullscreenElement));
      const [compareZ, setCompareZ] = useState(null);

      const activeSequence = useMemo(
        () => VIEWS.find((view) => view.id === activeView) || VIEWS[0],
        [activeView]
      );

      const sequence = activeSequence.sequence;
      const currentZ = sequence[stepIndex];
      const element = ELEMENTS[currentZ];

      const nucleusDots = useMemo(() => getNucleusDots(element.z), [element.z]);
      const shellRadii = useMemo(
        () => getShellRadiiForElement(element, sequence),
        [element, sequence]
      );
      const valenceElectrons = useMemo(
        () => getValenceElectrons(element, shellRadii),
        [element, shellRadii]
      );
      const outerRadius = shellRadii[element.shells - 1];
      const radialTarget = valenceElectrons[0] || { x: outerRadius, y: 0 };
      const configLabel = element.config.join(" | ");

      const centeredGridPath = useMemo(() => getCenteredGridPath(400, LEFT_GRID), []);
      const chartGridPath = useMemo(() => getRectGridPath(400, 340, RIGHT_GRID), []);

      const chartMetrics = useMemo(() => {
        const width = 400;
        const height = 340;
        const marginLeft = 52;
        const marginRight = 22;
        const top = 52;
        const barHeight = 240;
        const bottom = top + barHeight;
        const innerWidth = width - marginLeft - marginRight;
        const maxRadius = Math.max(...sequence.map((z) => ELEMENTS[z].r));
        const roundedMax = roundChartMax(maxRadius);
        const slot = innerWidth / sequence.length;
        const barWidth = Math.min(28, slot * 0.58);
        const ticks = Array.from({ length: 4 }, (_, index) => {
          const value = Math.round((roundedMax / 3) * index);
          const y = bottom - (value / roundedMax) * barHeight;
          return { value, y };
        });

        return {
          width,
          height,
          marginLeft,
          marginRight,
          top,
          bottom,
          barHeight,
          innerWidth,
          slot,
          barWidth,
          roundedMax,
          ticks,
        };
      }, [sequence]);

      useEffect(() => {
        if (!isPlaying) {
          return undefined;
        }

        const intervalId = window.setInterval(() => {
          setStepIndex((current) => {
            if (current >= sequence.length - 1) {
              setIsPlaying(false);
              return current;
            }
            return current + 1;
          });
        }, 1200);

        return () => window.clearInterval(intervalId);
      }, [isPlaying, sequence.length]);

      useEffect(() => {
        const handleFullscreenChange = () => {
          setIsFullscreen(Boolean(document.fullscreenElement));
        };

        document.addEventListener('fullscreenchange', handleFullscreenChange);
        return () => document.removeEventListener('fullscreenchange', handleFullscreenChange);
      }, []);

      const handleViewChange = (viewId) => {
        setActiveView(viewId);
        setStepIndex(0);
        setCompareZ(null);
      };

      const handleReset = () => {
        setActiveView(INITIAL_VIEW);
        setStepIndex(0);
        setCompareZ(null);
        setIsPlaying(false);
      };

      const handleFullscreenToggle = () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
          return;
        }

        document.exitFullscreen().catch(() => {});
      };

      return (
        <div className="app">
          <header className="header">
            <div>
              <div className="eyebrow">Simulation · Chemistry</div>
              <h1 className="title">Atomic Size Trends</h1>
            </div>
            <div className="controls">
              <button
                className="btn-circle"
                onClick={() => setIsPlaying((value) => !value)}
                aria-label={isPlaying ? "Pause" : "Play"}
              >
                {isPlaying ? (
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="6" y="5" width="4" height="14" />
                    <rect x="14" y="5" width="4" height="14" />
                  </svg>
                ) : (
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <polygon points="7,5 19,12 7,19" />
                  </svg>
                )}
              </button>
              <button
                className="btn-circle outline"
                onClick={handleReset}
                aria-label="Reset"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 12a8 8 0 1 0 3-6.25" />
                  <path d="M4 4v5h5" />
                </svg>
              </button>
              <button
                className="btn-circle outline"
                onClick={handleFullscreenToggle}
                aria-label={isFullscreen ? "Exit fullscreen" : "Enter fullscreen"}
                title={isFullscreen ? "Exit fullscreen" : "Enter fullscreen"}
              >
                {isFullscreen ? (
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M9 5H5v4M19 9V5h-4M15 19h4v-4M5 15v4h4" />
                  </svg>
                ) : (
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M5 9V5h4M15 5h4v4M19 15v4h-4M9 19H5v-4" />
                  </svg>
                )}
              </button>
            </div>
          </header>

          <div className="body">
            <div className="stage">
              <div className="stage-left">
                <div className="stage-panel">
                  <svg viewBox="-200 -200 400 400" role="img" aria-label={`${element.name} atom diagram`}>
                    <path d={centeredGridPath} fill="none" stroke="var(--stage-grid)" strokeWidth="0.5" />

                    {shellRadii.map((radius, index) => (
                      <g key={`shell-${index}`}>
                        <circle
                          cx="0"
                          cy="0"
                          r={radius}
                          fill="none"
                          stroke="var(--stage-axis)"
                          strokeWidth="1"
                        />
                        <text
                          x="0"
                          y={-radius - 10}
                          textAnchor="middle"
                          fill="var(--dark-mute)"
                          fontFamily="var(--mono)"
                          fontSize="10"
                          letterSpacing="0.08em"
                        >
                          {`n=${index + 1}`}
                        </text>
                      </g>
                    ))}

                    <line
                      x1="0"
                      y1="0"
                      x2={radialTarget.x}
                      y2={radialTarget.y}
                      stroke="var(--stage-dash)"
                      strokeWidth="1"
                      strokeDasharray="4 4"
                    />
                    <rect
                      x={radialTarget.x / 2 - 12}
                      y={radialTarget.y / 2 - 11}
                      width="24"
                      height="22"
                      rx="6"
                      fill="var(--stage-chip)"
                    />
                    <text
                      x={radialTarget.x / 2}
                      y={radialTarget.y / 2 + 4}
                      textAnchor="middle"
                      fill="var(--dark-ink)"
                      fontFamily="var(--mono)"
                      fontSize="11"
                    >
                      r
                    </text>

                    {nucleusDots.map((dot) => (
                      <circle
                        key={dot.id}
                        cx={dot.x}
                        cy={dot.y}
                        r="3.3"
                        fill="var(--dark-ink)"
                        opacity="0.9"
                      />
                    ))}

                    {valenceElectrons.map((electron) => (
                      <circle
                        key={electron.id}
                        cx={electron.x}
                        cy={electron.y}
                        r="4.5"
                        fill="var(--accent)"
                      />
                    ))}

                    <g transform="translate(-178 -176)">
                      {[
                        ["ELEMENT", element.sym],
                        ["Z", String(element.z)],
                        ["SHELLS", String(element.shells)],
                        ["CONFIG", configLabel],
                        ["RADIUS", `${element.r} pm`],
                      ].map(([label, value], index) => (
                        <g key={label} transform={`translate(0 ${index * 16})`}>
                          <text
                            x="0"
                            y="0"
                            fill="var(--dark-mute)"
                            fontFamily="var(--mono)"
                            fontSize="10"
                            letterSpacing="0.08em"
                          >
                            {label}
                          </text>
                          <text
                            x="88"
                            y="0"
                            fill="var(--dark-ink)"
                            fontFamily="var(--mono)"
                            fontSize="10"
                            letterSpacing="0.04em"
                          >
                            {value}
                          </text>
                        </g>
                      ))}
                    </g>
                  </svg>
                </div>
              </div>

              <div className="stage-right">
                <div className="stage-panel">
                  <svg viewBox="0 0 400 340" role="img" aria-label="Atomic radius trend chart">
                    <path d={chartGridPath} fill="none" stroke="var(--stage-grid)" strokeWidth="0.5" />

                    <text
                      x={chartMetrics.marginLeft}
                      y="24"
                      fill="var(--dark-mute)"
                      fontFamily="var(--mono)"
                      fontSize="11"
                      letterSpacing="0.14em"
                    >
                      ATOMIC RADIUS (pm)
                    </text>

                    {chartMetrics.ticks.map((tick) => (
                      <g key={`tick-${tick.value}`}>
                        <line
                          x1={chartMetrics.marginLeft}
                          y1={tick.y}
                          x2={400 - chartMetrics.marginRight}
                          y2={tick.y}
                          stroke="var(--stage-axis)"
                          strokeWidth="1"
                        />
                        <text
                          x={chartMetrics.marginLeft - 10}
                          y={tick.y + 4}
                          textAnchor="end"
                          fill="var(--dark-mute)"
                          fontFamily="var(--mono)"
                          fontSize="10"
                        >
                          {tick.value}
                        </text>
                      </g>
                    ))}

                    <line
                      x1={chartMetrics.marginLeft}
                      y1={chartMetrics.bottom}
                      x2={400 - chartMetrics.marginRight}
                      y2={chartMetrics.bottom}
                      stroke="var(--stage-axis)"
                      strokeWidth="1"
                    />

                    {sequence.map((z, index) => {
                      const entry = ELEMENTS[z];
                      const x = chartMetrics.marginLeft + chartMetrics.slot * index + chartMetrics.slot / 2 - chartMetrics.barWidth / 2;
                      const height = (entry.r / chartMetrics.roundedMax) * chartMetrics.barHeight;
                      const y = chartMetrics.bottom - height;
                      const isCurrent = z === currentZ;
                      const isCompare = z === compareZ;
                      return (
                        <g key={z}>
                          <rect
                            className="bar-rect"
                            x={x}
                            y={y}
                            width={chartMetrics.barWidth}
                            height={height}
                            rx="6"
                            fill={isCurrent ? "var(--accent)" : "var(--stage-fill-muted)"}
                          />
                          {isCompare && (
                            <rect
                              className="bar-ghost"
                              x={x}
                              y={y}
                              width={chartMetrics.barWidth}
                              height={height}
                              rx="6"
                              fill="none"
                              stroke="var(--stage-ghost)"
                              strokeWidth="1.5"
                              strokeDasharray="5 4"
                            />
                          )}
                          <text
                            x={x + chartMetrics.barWidth / 2}
                            y={chartMetrics.bottom + 18}
                            textAnchor="middle"
                            fill="var(--dark-mute)"
                            fontFamily="var(--mono)"
                            fontSize="10"
                            letterSpacing="0.05em"
                          >
                            {entry.sym}
                          </text>
                        </g>
                      );
                    })}
                  </svg>
                </div>
              </div>
            </div>
          </div>

          <div className="params">
            <div className="view-btns">
              <span className="label-mono">View</span>
              <div className="btn-group">
                {VIEWS.map((view) => (
                  <button
                    key={view.id}
                    type="button"
                    className={`view-btn ${activeView === view.id ? "active" : ""}`}
                    onClick={() => handleViewChange(view.id)}
                  >
                    {view.label}
                  </button>
                ))}
              </div>
            </div>

            <div className="slider-group">
              <div className="label-row">
                <span className="label-mono">Element</span>
                <span className="label-mono">
                  {element.sym} — STEP {stepIndex + 1} / {sequence.length}
                </span>
              </div>
              <input
                type="range"
                min="0"
                max={sequence.length - 1}
                value={stepIndex}
                onChange={(event) => setStepIndex(Number(event.target.value))}
              />
            </div>

            <button
              type="button"
              className="btn ghost"
              onClick={() => setCompareZ(currentZ)}
              disabled={compareZ === currentZ}
            >
              {compareZ ? `vs ${ELEMENTS[compareZ].sym}` : "COMPARE"}
            </button>
          </div>

          <div className="prompt">{PROMPTS[activeView]}</div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
  <script src="_shared/projector-mode.js"></script>
</body>
</html>
