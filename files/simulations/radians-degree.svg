  <line x1="96" y1="70" x2="104" y2="70" stroke="var(--ink)" stroke-width="1"/>
  <line x1="100" y1="66" x2="100" y2="74" stroke="var(--ink)" stroke-width="1"/>

  <circle cx="100" cy="70" r="42" fill="none" stroke="var(--ink)" stroke-width="1.2"/>
  <path d="M142 70 A42 42 0 0 0 79 33.6" fill="none" stroke="var(--accent)" stroke-width="5" stroke-linecap="round"/>
