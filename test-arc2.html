<!DOCTYPE html>
<html>
<body>
<h2>sweep=0, large=0</h2>
<svg width="200" height="200" style="background: #eee">
  <g transform="translate(100, 100)">
    <circle cx="0" cy="0" r="40" stroke="#ccc" fill="none"/>
    <line x1="0" y1="0" x2="0" y2="40" stroke="black" />
    <line x1="0" y1="0" x2="20" y2="-34.641" stroke="blue" />
    
    <path d="M 0 40 A 40 40 0 0 0 20 -34.641" fill="none" stroke="red" stroke-width="2" />
  </g>
</svg>

<h2>sweep=0, large=1 (since we want the arc to be CCW? wait)</h2>
<svg width="200" height="200" style="background: #eee">
  <g transform="translate(100, 100)">
    <circle cx="0" cy="0" r="40" stroke="#ccc" fill="none"/>
    <line x1="0" y1="0" x2="0" y2="40" stroke="black" />
    <line x1="0" y1="0" x2="20" y2="-34.641" stroke="blue" />
    
    <!-- large-arc=1? No, 150 < 180 so it should be large=0 -->
    <path d="M 0 40 A 40 40 0 0 0 20 -34.641" fill="none" stroke="red" stroke-width="2" />
  </g>
</svg>
</body>
</html>
